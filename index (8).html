
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PrintOS — ניהול בית דפוס</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#080E17;font-family:'Heebo',sans-serif;color:#E2E8F0}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:4px}
select option{background:#0D1621;color:#fff}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.5)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){
  .sd{display:none!important}
  .sm{display:block!important}
  .tm{display:flex!important}
  .bn{display:block!important}
  .ma{margin-right:0!important;padding:12px 12px 80px!important}
  .kg{grid-template-columns:repeat(2,1fr)!important}
  .mg{grid-template-columns:1fr!important}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect}=React;
const SU="https://pvwcpukfhyrmdpxgfwrk.supabase.co";
const SA="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2d2NwdWtmaHlybWRweGdmd3JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NzIzNzMsImV4cCI6MjA5MjQ0ODM3M30.69GpTOQdwtAgouGN0MIHqQc6bImxAbfQ72xL2S4KaoM";

const sb=async(path,o={})=>{
  const r=await fetch(`${SU}/rest/v1/${path}`,{headers:{apikey:SA,Authorization:`Bearer ${SA}`,"Content-Type":"application/json",Prefer:o.prefer||"return=representation",...o.headers},method:o.method||"GET",body:o.body});
  const t=await r.text();if(!r.ok)throw new Error(t);return t?JSON.parse(t):[];
};

const DEPTS=["פורמט רחב","דיגיטלי צבעוני","דיגיטלי שחור לבן","אופסט","עבודות חוץ","משלוחים","תזכורות"];
const SC={"ממתין":{c:"#F59E0B",bg:"rgba(245,158,11,0.13)"},"בביצוע":{c:"#3B82F6",bg:"rgba(59,130,246,0.13)"},"הושלם":{c:"#10B981",bg:"rgba(16,185,129,0.13)"},"תקוע":{c:"#EF4444",bg:"rgba(239,68,68,0.13)"}};

const Badge=({status})=>{const s=SC[status]||{};return<span style={{background:s.bg,color:s.c,border:`1px solid ${s.c}33`,borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:600,display:"inline-flex",alignItems:"center",gap:5,whiteSpace:"nowrap",flexShrink:0}}><span style={{width:6,height:6,borderRadius:"50%",background:s.c,flexShrink:0}}/>{status}</span>};

const Av=({u,sz=36})=>{
  const color=u.color||"#6366F1";
  const ini=u.initials||(u.name?u.name[0]:"?");
  return<div style={{width:sz,height:sz,borderRadius:"50%",background:`linear-gradient(135deg,${color},${color}88)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:sz*0.33,fontWeight:800,color:"#fff",flexShrink:0}}>{ini}</div>;
};

const Sp=({sz=20})=><div style={{width:sz,height:sz,border:"2px solid rgba(255,255,255,0.15)",borderTop:"2px solid #3B82F6",borderRadius:"50%",animation:"spin 0.8s linear infinite",flexShrink:0}}/>;
const Modal=({open,onClose,children})=>!open?null:<div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",backdropFilter:"blur(6px)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}><div onClick={e=>e.stopPropagation()} style={{background:"#0D1621",border:"1px solid rgba(255,255,255,0.1)",borderRadius:20,padding:26,width:"100%",maxWidth:500,maxHeight:"88vh",overflowY:"auto",boxShadow:"0 30px 80px rgba(0,0,0,0.7)"}}>{children}</div></div>;

function Login({onLogin}){
  const [users,setUsers]=useState([]);
  const [sel,setSel]=useState(null);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    sb("users?order=role.desc,name.asc")
      .then(u=>{setUsers(u);setLoading(false);})
      .catch(()=>setLoading(false));
  },[]);

  if(loading)return<div style={{minHeight:"100vh",background:"#080E17",display:"flex",alignItems:"center",justifyContent:"center"}}><Sp sz={32}/></div>;

  return<div style={{minHeight:"100vh",background:"#080E17",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
    <div style={{width:"100%",maxWidth:400}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{width:60,height:60,borderRadius:16,background:"linear-gradient(135deg,#3B82F6,#6366F1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 14px"}}>🖨️</div>
        <h1 style={{color:"#F8FAFC",fontSize:24,fontWeight:900,margin:"0 0 4px"}}>PrintOS</h1>
        <p style={{color:"#64748B",margin:0,fontSize:13}}>בחר את הפרופיל שלך</p>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:14}}>
        {users.map(u=><button key={u.id} onClick={()=>setSel(u.id)} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 15px",borderRadius:12,border:"2px solid",borderColor:sel===u.id?(u.color||"#6366F1"):"rgba(255,255,255,0.07)",background:sel===u.id?`${u.color||"#6366F1"}15`:"rgba(255,255,255,0.03)",cursor:"pointer",fontFamily:"inherit",textAlign:"right",transition:"all 0.15s",width:"100%"}}>
          <Av u={u} sz={36}/>
          <div style={{flex:1}}>
            <div style={{color:"#F8FAFC",fontWeight:700,fontSize:13}}>{u.name}</div>
            <div style={{color:"#64748B",fontSize:11,marginTop:1}}>{u.role==="admin"?"👑 מנהל — כל המחלקות":`🏭 ${u.dept}`}</div>
          </div>
          {sel===u.id&&<span style={{color:u.color||"#6366F1",fontSize:16,fontWeight:900}}>✓</span>}
        </button>)}
      </div>
      <button onClick={()=>{const u=users.find(u=>u.id===sel);if(u)onLogin(u);}} disabled={!sel} style={{width:"100%",padding:"12px",borderRadius:12,border:"none",background:sel?"linear-gradient(135deg,#3B82F6,#6366F1)":"rgba(255,255,255,0.05)",color:sel?"#fff":"#475569",fontWeight:700,fontSize:14,cursor:sel?"pointer":"not-allowed",fontFamily:"inherit"}}>
        {sel?`כניסה כ-${users.find(u=>u.id===sel)?.name}`:"בחר פרופיל"}
      </button>
    </div>
  </div>;
}

function DebtTab({debt,notify}){
  const [df2,setDf2]=useState("הכל");
  const [editing,setEditing]=useState(null);
  const [editData,setEditData]=useState({payment_status:"ממתין",payment_notes:""});
  const [localDebt,setLocalDebt]=useState(debt);
  useEffect(()=>setLocalDebt(debt),[debt]);

  const overdue=localDebt.filter(d=>d.status==="באיחור").sort((a,b)=>b.days_overdue-a.days_overdue);
  const current=localDebt.filter(d=>d.status!=="באיחור").sort((a,b)=>b.amount-a.amount);
  const shown=df2==="הכל"?localDebt:df2==="באיחור"?overdue:current;
  const totD2=localDebt.reduce((s,d)=>s+Number(d.amount),0);
  const ovD2=overdue.reduce((s,d)=>s+Number(d.amount),0);

  const PS={"ממתין":{c:"#F59E0B",bg:"rgba(245,158,11,0.13)"},"בטיפול":{c:"#3B82F6",bg:"rgba(59,130,246,0.13)"},"הבטיח תשלום":{c:"#8B5CF6",bg:"rgba(139,92,246,0.13)"},"שולם":{c:"#10B981",bg:"rgba(16,185,129,0.13)"}};

  const startEdit=d=>{setEditing(d.id);setEditData({payment_status:d.payment_status||"ממתין",payment_notes:d.payment_notes||""});};

  const saveEdit=async id=>{
    try{
      await sb(`debt?id=eq.${id}`,{method:"PATCH",body:JSON.stringify({payment_status:editData.payment_status,payment_notes:editData.payment_notes})});
      setLocalDebt(p=>p.map(d=>d.id===id?{...d,...editData}:d));
      setEditing(null);notify("✅ עודכן!");
    }catch(e){notify("שגיאה","#EF4444");}
  };

  const exportExcel=()=>{
    try{
      const XLSX=window.XLSX;
      const now=new Date().toLocaleDateString('he-IL');
      const all=[...overdue,...current];
      const total=localDebt.reduce((s,d)=>s+Number(d.amount),0);

      // Style helpers
      const hdrStyle=(bg,fg="FFFFFF")=>({font:{name:"Arial",bold:true,sz:11,color:{rgb:fg}},fill:{fgColor:{rgb:bg}},alignment:{horizontal:"center",vertical:"center",readingOrder:2},border:{top:{style:"thin",color:{rgb:"FFFFFF"}},bottom:{style:"thin",color:{rgb:"FFFFFF"}},left:{style:"thin",color:{rgb:"FFFFFF"}},right:{style:"thin",color:{rgb:"FFFFFF"}}}});
      const datStyle=(bg,fg,bold=false,al="center")=>({font:{name:"Arial",sz:10,bold,color:{rgb:fg}},fill:{fgColor:{rgb:bg}},alignment:{horizontal:al,vertical:"center",readingOrder:2},border:{top:{style:"thin",color:{rgb:"E2E8F0"}},bottom:{style:"thin",color:{rgb:"E2E8F0"}},left:{style:"thin",color:{rgb:"E2E8F0"}},right:{style:"thin",color:{rgb:"E2E8F0"}}}});
      const titleStyle=(bg,fg,sz=18)=>({font:{name:"Arial",bold:true,sz,color:{rgb:fg}},fill:{fgColor:{rgb:bg}},alignment:{horizontal:"right",vertical:"center",readingOrder:2}});
      const totalStyle={font:{name:"Arial",bold:true,sz:11,color:{rgb:"FFFFFF"}},fill:{fgColor:{rgb:"1E3A5F"}},alignment:{horizontal:"center",vertical:"center"},border:{top:{style:"medium",color:{rgb:"2563EB"}},bottom:{style:"medium",color:{rgb:"2563EB"}}}};

      const setCell=(ws,addr,value,style,fmt)=>{
        ws[addr]={v:value,t:typeof value==='number'?'n':'s',s:style};
        if(fmt)ws[addr].z=fmt;
      };

      const makeRange=(ws,rows,cols)=>{ws['!ref']=`A1:${String.fromCharCode(64+cols)}${rows}`;};

      // ── SHEET 1: סיכום ──
      const ws1={};
      // Title row
      ws1['!merges']=[
        {s:{r:0,c:0},e:{r:0,c:5}},
        {s:{r:1,c:0},e:{r:1,c:5}},
        {s:{r:3,c:0},e:{r:4,c:1}},
        {s:{r:3,c:2},e:{r:4,c:3}},
        {s:{r:3,c:4},e:{r:4,c:5}},
      ];

      setCell(ws1,'A1',`דוח גבייה — בית דפוס`,titleStyle("0F172A","F8FAFC",18));
      for(let c=1;c<6;c++)setCell(ws1,String.fromCharCode(65+c)+'1',"",{fill:{fgColor:{rgb:"0F172A"}}});
      setCell(ws1,'A2',`נוצר: ${now}  |  ${all.length} לקוחות חייבים`,{...titleStyle("0F172A","64748B",10),font:{name:"Arial",sz:10,color:{rgb:"64748B"}}});
      for(let c=1;c<6;c++)setCell(ws1,String.fromCharCode(65+c)+'2',"",{fill:{fgColor:{rgb:"0F172A"}}});

      // KPI
      setCell(ws1,'A3',`סה״כ חוב: ₪${total.toLocaleString()}`,{font:{name:"Arial",bold:true,sz:13,color:{rgb:"1E40AF"}},fill:{fgColor:{rgb:"DBEAFE"}},alignment:{horizontal:"center",vertical:"center",readingOrder:2}});
      setCell(ws1,'A4',"",{fill:{fgColor:{rgb:"DBEAFE"}}});
      setCell(ws1,'C3',`באיחור: ₪${overdue.reduce((s,d)=>s+Number(d.amount),0).toLocaleString()}`,{font:{name:"Arial",bold:true,sz:13,color:{rgb:"991B1B"}},fill:{fgColor:{rgb:"FEE2E2"}},alignment:{horizontal:"center",vertical:"center",readingOrder:2}});
      setCell(ws1,'C4',"",{fill:{fgColor:{rgb:"FEE2E2"}}});
      setCell(ws1,'E3',`שוטף: ₪${current.reduce((s,d)=>s+Number(d.amount),0).toLocaleString()}`,{font:{name:"Arial",bold:true,sz:13,color:{rgb:"14532D"}},fill:{fgColor:{rgb:"DCFCE7"}},alignment:{horizontal:"center",vertical:"center",readingOrder:2}});
      setCell(ws1,'E4',"",{fill:{fgColor:{rgb:"DCFCE7"}}});
      for(let c=1;c<6;c+=2){['3','4'].forEach(r=>{ if(ws1[String.fromCharCode(65+c)+r])return; setCell(ws1,String.fromCharCode(65+c)+r,"",{fill:{fgColor:{rgb:"F8FAFC"}}}); }); }

      // Headers row 6
      ["לקוח","סכום (₪)","תאריך פירעון","ימי איחור","דחיפות","סטטוס"].forEach((h,i)=>{
        setCell(ws1,String.fromCharCode(65+i)+'5',h,hdrStyle("1E3A5F"));
      });

      // Data
      all.forEach((d,i)=>{
        const r=i+6;
        const isOv=d.status==="באיחור";
        const days=d.days_overdue;
        const bg=isOv?(i%2===0?"FEF2F2":"FFF7F7"):(i%2===0?"F8FAFC":"FFFFFF");
        const urg=isOv?(days>90?"🔴 דחוף מאוד":days>30?"🟠 דחוף":"🟡 עקוב"):"🟢 שוטף";
        const uc=isOv?(days>90?"991B1B":days>30?"C2410C":"854D0E"):"14532D";
        setCell(ws1,`A${r}`,d.client_name,datStyle(bg,"1E293B",true,"right"));
        setCell(ws1,`B${r}`,Number(d.amount),datStyle(bg,isOv?"DC2626":"16A34A",true),'#,##0');
        setCell(ws1,`C${r}`,d.due_date,datStyle(bg,"475569"));
        setCell(ws1,`D${r}`,isOv?days:"—",datStyle(bg,isOv?"DC2626":"475569",isOv));
        setCell(ws1,`E${r}`,urg,datStyle(bg,uc));
        setCell(ws1,`F${r}`,isOv?"באיחור":"שוטף",datStyle(bg,isOv?"DC2626":"16A34A",true));
      });

      // Total
      const tr=all.length+6;
      setCell(ws1,`A${tr}`,"סה״כ",totalStyle);
      setCell(ws1,`B${tr}`,total,{...totalStyle,z:'#,##0'});
      ["C","D","E","F"].forEach(c=>setCell(ws1,`${c}${tr}`,"",totalStyle));
      ws1[`B${tr}`].z='#,##0';

      makeRange(ws1,tr,6);
      ws1['!cols']=[{wch:34},{wch:16},{wch:14},{wch:12},{wch:16},{wch:12}];
      ws1['!rows']=[{hpt:30},{hpt:18},{hpt:36},{hpt:36},{hpt:26}];

      // ── SHEET 2: באיחור ──
      const ws2={};
      ws2['!merges']=[{s:{r:0,c:0},e:{r:1,c:5}}];
      setCell(ws2,'A1',`חייבים באיחור — ${overdue.length} לקוחות | ₪${overdue.reduce((s,d)=>s+Number(d.amount),0).toLocaleString()}`,titleStyle("450A0A","FECACA",14));
      for(let c=1;c<6;c++)setCell(ws2,String.fromCharCode(65+c)+'1',"",{fill:{fgColor:{rgb:"450A0A"}}});
      setCell(ws2,'A2',"",{fill:{fgColor:{rgb:"450A0A"}}});

      ["לקוח","סכום (₪)","תאריך פירעון","ימי איחור","דחיפות"].forEach((h,i)=>{
        setCell(ws2,String.fromCharCode(65+i)+'3',h,hdrStyle("DC2626"));
      });

      overdue.forEach((d,i)=>{
        const r=i+4;
        const days=d.days_overdue;
        const bg=i%2===0?"FEF2F2":"FFFFFF";
        const urg=days>90?"🔴 דחוף מאוד":days>30?"🟠 דחוף":"🟡 עקוב";
        const uc=days>90?"991B1B":days>30?"C2410C":"854D0E";
        setCell(ws2,`A${r}`,d.client_name,datStyle(bg,"1E293B",true,"right"));
        setCell(ws2,`B${r}`,Number(d.amount),datStyle(bg,"DC2626",true));
        ws2[`B${r}`].z='#,##0';
        setCell(ws2,`C${r}`,d.due_date,datStyle(bg,"475569"));
        setCell(ws2,`D${r}`,days,datStyle(bg,"DC2626",true));
        setCell(ws2,`E${r}`,urg,datStyle(bg,uc));
      });

      const tr2=overdue.length+4;
      setCell(ws2,`A${tr2}`,"סה״כ",totalStyle);
      setCell(ws2,`B${tr2}`,overdue.reduce((s,d)=>s+Number(d.amount),0),{...totalStyle,z:'#,##0'});
      ws2[`B${tr2}`].z='#,##0';
      ["C","D","E"].forEach(c=>setCell(ws2,`${c}${tr2}`,"",totalStyle));
      makeRange(ws2,tr2,5);
      ws2['!cols']=[{wch:34},{wch:16},{wch:14},{wch:12},{wch:18}];

      const wb=XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb,ws1,"סיכום");
      XLSX.utils.book_append_sheet(wb,ws2,"חייבים באיחור");
      XLSX.writeFile(wb,"דוח_גבייה.xlsx");
      notify("📥 הדוח הורד!","#10B981");
    }catch(e){console.error(e);notify("שגיאה: "+e.message,"#EF4444");}
  };

  const TA={background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:8,padding:"9px 12px",color:"#fff",fontSize:12,width:"100%",outline:"none",fontFamily:"inherit",direction:"rtl",resize:"vertical",minHeight:70};

  return<div>
    <div style={{marginBottom:20,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:12}}>
      <div><h1 style={{fontSize:22,fontWeight:900,margin:0}}>מערכת גבייה</h1><p style={{color:"#64748B",margin:"3px 0 0",fontSize:12}}>{localDebt.length} לקוחות</p></div>
      <button onClick={exportExcel} style={{padding:"10px 20px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#10B981,#059669)",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>📥 הורד דוח אקסל</button>
    </div>
    <div className="kg" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:16}}>
      {[{lb:"סה״כ",v:`₪${totD2.toLocaleString()}`,c:"#3B82F6",ic:"📊"},{lb:"באיחור",v:`₪${ovD2.toLocaleString()}`,c:"#EF4444",ic:"🚨"},{lb:"לקוחות",v:localDebt.length,c:"#10B981",ic:"👥"}].map((x,i)=><div key={i} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:18}}>
        <div style={{fontSize:18,marginBottom:6}}>{x.ic}</div><div style={{fontSize:22,fontWeight:900,color:x.c}}>{x.v}</div><div style={{color:"#64748B",fontSize:11,marginTop:4}}>{x.lb}</div>
      </div>)}
    </div>
    <div style={{display:"flex",gap:8,marginBottom:16}}>
      {["הכל","באיחור","שוטף"].map(f=><button key={f} onClick={()=>setDf2(f)} style={{padding:"6px 16px",borderRadius:20,border:"1px solid",borderColor:df2===f?(f==="באיחור"?"#EF4444":"#3B82F6"):"rgba(255,255,255,0.1)",background:df2===f?(f==="באיחור"?"rgba(239,68,68,0.15)":"rgba(59,130,246,0.15)"):"transparent",color:df2===f?(f==="באיחור"?"#EF4444":"#60A5FA"):"#64748B",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{f} ({f==="באיחור"?overdue.length:f==="שוטף"?current.length:localDebt.length})</button>)}
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {shown.map(d=>{
        const ps=PS[d.payment_status||"ממתין"]||PS["ממתין"];
        const isOver=d.status==="באיחור";
        const isEdit=editing===d.id;
        return<div key={d.id} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${isOver?"rgba(239,68,68,0.2)":"rgba(255,255,255,0.07)"}`,borderRadius:14,padding:16}}>
          <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:isEdit?12:0}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:700,fontSize:14,marginBottom:5}}>{d.client_name}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
                <span style={{fontWeight:800,color:isOver?"#EF4444":"#10B981",fontSize:15}}>₪{Number(d.amount).toLocaleString()}</span>
                {isOver&&<span style={{color:"#EF4444",fontSize:12}}>• {d.days_overdue} ימי איחור</span>}
                <span style={{background:ps.bg,color:ps.c,border:`1px solid ${ps.c}33`,borderRadius:20,padding:"2px 9px",fontSize:11,fontWeight:600}}>{d.payment_status||"ממתין"}</span>
              </div>
              {d.payment_notes&&!isEdit&&<div style={{marginTop:8,padding:"7px 11px",background:"rgba(99,102,241,0.08)",borderRadius:8,fontSize:12,color:"#94A3B8",borderRight:"3px solid #6366F1"}}>💬 {d.payment_notes}</div>}
            </div>
            <button onClick={()=>isEdit?setEditing(null):startEdit(d)} style={{padding:"6px 12px",borderRadius:8,border:"1px solid rgba(255,255,255,0.1)",background:isEdit?"rgba(239,68,68,0.1)":"rgba(255,255,255,0.05)",color:isEdit?"#EF4444":"#94A3B8",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",flexShrink:0,whiteSpace:"nowrap"}}>
              {isEdit?"✕ סגור":"✏️ עדכן"}
            </button>
          </div>
          {isEdit&&<div style={{borderTop:"1px solid rgba(255,255,255,0.08)",paddingTop:12,display:"flex",flexDirection:"column",gap:10}}>
            <div>
              <label style={{color:"#94A3B8",fontSize:11,fontWeight:700,marginBottom:6,display:"block"}}>סטטוס תשלום</label>
              <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                {Object.entries(PS).map(([s,sc])=><button key={s} onClick={()=>setEditData(p=>({...p,payment_status:s}))} style={{padding:"6px 14px",borderRadius:20,border:"1px solid",borderColor:editData.payment_status===s?sc.c:"rgba(255,255,255,0.1)",background:editData.payment_status===s?sc.bg:"transparent",color:editData.payment_status===s?sc.c:"#64748B",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{s}</button>)}
              </div>
            </div>
            <div>
              <label style={{color:"#94A3B8",fontSize:11,fontWeight:700,marginBottom:6,display:"block"}}>הערות</label>
              <textarea value={editData.payment_notes} onChange={e=>setEditData(p=>({...p,payment_notes:e.target.value}))} placeholder="לדוגמה: הלקוח אמר שיעביר ב-01/05, כפיר דיבר איתו..." style={TA} rows={3}/>
            </div>
            <button onClick={()=>saveEdit(d.id)} style={{padding:"10px",borderRadius:9,border:"none",background:"linear-gradient(135deg,#3B82F6,#6366F1)",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>💾 שמור</button>
          </div>}
        </div>;
      })}
    </div>
  </div>;
}

function App(){
  const [user,setUser]=useState(null);
  const [tasks,setTasks]=useState([]);
  const [clients,setClients]=useState([]);
  const [debt,setDebt]=useState([]);
  const [tab,setTab]=useState("dashboard");
  const [mob,setMob]=useState(false);
  const [addTask,setAddTask]=useState(false);
  const [addClient,setAddClient]=useState(false);
  const [det,setDet]=useState(null);
  const [df,setDf]=useState("הכל");
  const [notif,setNotif]=useState(null);
  const [loading,setLoading]=useState(false);
  const [nt,setNt]=useState({title:"",dept:DEPTS[0],priority:"בינונית",client_name:"",assignee:"",due_date:"",notes:"",status:"ממתין",address:"",phone:""});
  const [nc,setNc]=useState({name:"",phone:"",email:"",address:"",payment_terms:"שוטף + 30"});
  const [allUsers,setAllUsers]=useState([]);

  useEffect(()=>{
    sb("users?role=eq.worker&order=name.asc").then(setAllUsers).catch(()=>{});
  },[]);

  const notify=(m,c="#10B981")=>{setNotif({m,c});setTimeout(()=>setNotif(null),3000)};

  const load=async(u)=>{
    const cu=u||user;if(!cu)return;
    setLoading(true);
    try{
      const a=cu.role==="admin";
      const tp=a?"tasks?order=created_at.desc":`tasks?dept=eq.${encodeURIComponent(cu.dept)}&order=created_at.desc`;
      const [t,c,d]=await Promise.all([sb(tp),sb("clients?order=name.asc"),a?sb("debt?order=due_date.asc"):Promise.resolve([])]);
      setTasks(t);setClients(c);setDebt(d);
    }catch(e){notify("שגיאה: "+e.message,"#EF4444");}
    setLoading(false);
  };

  const isA=user?.role==="admin";
  const filt=(isA&&df!=="הכל")?tasks.filter(t=>t.dept===df):tasks;
  const byS=s=>tasks.filter(t=>t.status===s).length;
  const totD=debt.reduce((s,d)=>s+Number(d.amount),0);
  const ovD=debt.filter(d=>d.status==="באיחור").reduce((s,d)=>s+Number(d.amount),0);

  const doAddTask=async()=>{
    if(!nt.title.trim())return;
    try{
      let notes=nt.notes||"";
      if(nt.dept==="משלוחים"){
        const parts=[];
        if(nt.address)parts.push(`📍 ${nt.address}`);
        if(nt.phone)parts.push(`📞 ${nt.phone}`);
        if(parts.length)notes=(parts.join(" | ")+(notes?" | "+notes:""));
      }
      await sb("tasks",{method:"POST",body:JSON.stringify({title:nt.title,dept:nt.dept,priority:nt.priority,client_name:nt.client_name,assignee:nt.assignee,due_date:nt.due_date||null,notes,status:nt.status,created_by:user.name})});
      setNt({title:"",dept:DEPTS[0],priority:"בינונית",client_name:"",assignee:"",due_date:"",notes:"",status:"ממתין",address:"",phone:""});
      setAddTask(false);await load();notify("✅ משימה נוספה");
    }catch(e){notify("שגיאה","#EF4444");}
  };

  const doAddClient=async()=>{
    if(!nc.name.trim())return;
    try{await sb("clients",{method:"POST",body:JSON.stringify(nc)});
    setNc({name:"",phone:"",email:"",address:"",payment_terms:"שוטף + 30"});
    setAddClient(false);await load();notify("✅ לקוח נוסף");}catch(e){notify("שגיאה","#EF4444");}
  };

  const updStatus=async(id,s)=>{
    try{await sb(`tasks?id=eq.${id}`,{method:"PATCH",body:JSON.stringify({status:s})});
    setTasks(p=>p.map(t=>t.id===id?{...t,status:s}:t));
    if(det?.id===id)setDet(p=>({...p,status:s}));
    notify(`עודכן: ${s}`);}catch(e){notify("שגיאה","#EF4444");}
  };

  const IS={background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"10px 13px",color:"#fff",fontSize:13,width:"100%",outline:"none",fontFamily:"inherit",direction:"rtl"};
  const LS={color:"#94A3B8",fontSize:11,fontWeight:700,marginBottom:5,display:"block"};
  const navs=[{id:"dashboard",ic:"◈",lb:"דשבורד"},{id:"tasks",ic:"⊞",lb:"משימות"},...(isA?[{id:"clients",ic:"👥",lb:"לקוחות"},{id:"debt",ic:"₪",lb:"גבייה"}]:[])];

  if(!user)return<Login onLogin={u=>{setUser(u);load(u);}}/>;

  const color=user.color||"#6366F1";

  const Side=()=><div style={{display:"flex",flexDirection:"column",height:"100%",overflow:"hidden"}}>
    <div style={{padding:"20px 16px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)",flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:9}}>
        <div style={{width:32,height:32,borderRadius:9,background:"linear-gradient(135deg,#3B82F6,#6366F1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>🖨️</div>
        <div><div style={{fontWeight:800,fontSize:14,color:"#F8FAFC"}}>PrintOS</div><div style={{fontSize:10,color:"#64748B"}}>ניהול בית דפוס</div></div>
      </div>
    </div>
    <div style={{padding:"11px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",alignItems:"center",gap:9,flexShrink:0}}>

      <div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:12,color:"#F8FAFC",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.name}</div><div style={{fontSize:10,color:"#64748B"}}>{isA?"מנהל ראשי":user.dept}</div></div>

    </nav>
    {isA&&<div style={{padding:"0 8px 16px",flexShrink:0}}><button onClick={()=>{setAddTask(true);setMob(false);}} style={{width:"100%",padding:"9px",borderRadius:9,border:"none",background:"linear-gradient(135deg,#3B82F6,#6366F1)",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>+ משימה חדשה</button></div>}
  </div>;

  return<div style={{minHeight:"100vh",background:"#080E17",fontFamily:"'Heebo',sans-serif",color:"#E2E8F0",backgroundImage:"radial-gradient(ellipse at 20% 20%,rgba(59,130,246,0.05) 0%,transparent 60%)"}}>
    {notif&&<div style={{position:"fixed",top:18,left:"50%",transform:"translateX(-50%)",background:notif.c,color:"#fff",padding:"10px 20px",borderRadius:11,fontWeight:600,zIndex:9999,boxShadow:"0 8px 30px rgba(0,0,0,0.4)",whiteSpace:"nowrap",fontSize:13,animation:"fadeIn 0.3s ease"}}>{notif.m}</div>}
    {mob&&<div onClick={()=>setMob(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.65)",zIndex:199}}/>}

    <div style={{position:"fixed",top:0,bottom:0,right:0,width:200,background:"rgba(10,18,28,0.98)",borderLeft:"1px solid rgba(255,255,255,0.06)",backdropFilter:"blur(20px)",zIndex:200}} className="sd"><Side/></div>
    <div style={{position:"fixed",top:0,bottom:0,right:0,width:230,background:"rgba(10,18,28,0.99)",borderLeft:"1px solid rgba(255,255,255,0.08)",zIndex:210,transform:mob?"translateX(0)":"translateX(100%)",transition:"transform 0.28s ease",display:"none"}} className="sm"><Side/></div>

    <div style={{display:"none",position:"sticky",top:0,zIndex:150,background:"rgba(8,14,23,0.96)",backdropFilter:"blur(16px)",borderBottom:"1px solid rgba(255,255,255,0.06)",padding:"10px 15px",alignItems:"center",justifyContent:"space-between"}} className="tm">
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{width:26,height:26,borderRadius:7,background:"linear-gradient(135deg,#3B82F6,#6366F1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>🖨️</div>
        <span style={{fontWeight:800,fontSize:15,color:"#F8FAFC"}}>PrintOS</span>
        {tab!=="dashboard"&&<span style={{color:"#475569",fontSize:13}}>›</span>}
        {tab!=="dashboard"&&<span style={{color:"#94A3B8",fontSize:13}}>{navs.find(n=>n.id===tab)?.lb}</span>}
      </div>
      <div style={{display:"flex",gap:8}}>
        {tab!=="dashboard"&&<button onClick={()=>setTab("dashboard")} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:7,color:"#94A3B8",cursor:"pointer",padding:"5px 10px",fontSize:12,fontWeight:600,fontFamily:"inherit"}}>🏠 בית</button>}
        <button onClick={()=>setMob(true)} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:7,color:"#fff",cursor:"pointer",padding:"5px 9px",fontSize:16}}>☰</button>
      </div>
    </div>

    <div style={{display:"none",position:"fixed",bottom:0,left:0,right:0,zIndex:150,background:"rgba(10,18,28,0.98)",backdropFilter:"blur(16px)",borderTop:"1px solid rgba(255,255,255,0.07)"}} className="bn">
      <div style={{display:"flex",justifyContent:"space-around",padding:"6px 0 8px"}}>
        {navs.map(n=><button key={n.id} onClick={()=>setTab(n.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 8px",color:tab===n.id?"#60A5FA":"#475569",fontFamily:"inherit"}}><span style={{fontSize:18}}>{n.ic}</span><span style={{fontSize:10,fontWeight:600}}>{n.lb}</span></button>)}
        {isA&&<button onClick={()=>setAddTask(true)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 8px",color:"#60A5FA",fontFamily:"inherit"}}><span style={{fontSize:18}}>＋</span><span style={{fontSize:10,fontWeight:600}}>הוסף</span></button>}
      </div>
    </div>

    <div className="ma" style={{marginRight:200,padding:"24px 26px 40px"}}>
      {tab!=="dashboard"&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:20}}>
        <button onClick={()=>setTab("dashboard")} style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:8,color:"#94A3B8",cursor:"pointer",padding:"6px 12px",fontSize:12,fontWeight:600,fontFamily:"inherit",display:"flex",alignItems:"center",gap:5}}>🏠 דשבורד</button>
        <span style={{color:"#475569",fontSize:14}}>›</span>
        <span style={{color:"#F8FAFC",fontSize:13,fontWeight:600}}>{navs.find(n=>n.id===tab)?.lb}</span>
      </div>}

      {tab==="dashboard"&&<div>
        <div style={{marginBottom:20}}><h1 style={{fontSize:22,fontWeight:900,margin:0}}>שלום, {user.name.split(" ")[0]} 👋</h1><p style={{color:"#64748B",margin:"4px 0 0",fontSize:12}}>{isA?"סקירה כללית":`מחלקת ${user.dept}`}</p></div>
        {loading&&<div style={{display:"flex",alignItems:"center",gap:8,color:"#64748B",fontSize:12,marginBottom:14}}><Sp sz={16}/> טוען...</div>}

        <div className="kg" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:11,marginBottom:16}}>
          {[{lb:"בביצוע",v:byS("בביצוע"),ic:"⚡",c:"#3B82F6"},{lb:"ממתינות",v:byS("ממתין"),ic:"⏳",c:"#F59E0B"},{lb:"הושלמו",v:byS("הושלם"),ic:"✓",c:"#10B981"},{lb:"תקועות",v:byS("תקוע"),ic:"⚠",c:"#EF4444"}].map((x,i)=><div key={i} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:"16px 14px",position:"relative",overflow:"hidden"}}>
            <div style={{position:"absolute",top:-10,left:-10,width:50,height:50,borderRadius:"50%",background:`${x.c}13`}}/>
            <div style={{fontSize:17,marginBottom:6}}>{x.ic}</div>
            <div style={{fontSize:28,fontWeight:900,color:x.c,letterSpacing:"-1px",lineHeight:1}}>{x.v}</div>
            <div style={{fontSize:11,fontWeight:700,marginTop:4,color:"#94A3B8"}}>{x.lb}</div>
          </div>)}
        </div>

        <div className="mg" style={{display:"grid",gridTemplateColumns:isA?"1fr 1fr":"1fr",gap:14,marginBottom:14}}>
          {isA&&<div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:18}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}><div style={{fontWeight:800,fontSize:14}}>💳 גבייה</div><button onClick={()=>setTab("debt")} style={{background:"none",border:"none",color:"#3B82F6",cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"inherit"}}>פירוט ←</button></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              <div style={{background:"rgba(16,185,129,0.08)",borderRadius:10,padding:12}}><div style={{color:"#64748B",fontSize:10,fontWeight:600}}>סה״כ</div><div style={{fontSize:18,fontWeight:900,color:"#10B981",marginTop:2}}>₪{totD.toLocaleString()}</div></div>
              <div style={{background:"rgba(239,68,68,0.08)",borderRadius:10,padding:12}}><div style={{color:"#64748B",fontSize:10,fontWeight:600}}>באיחור</div><div style={{fontSize:18,fontWeight:900,color:"#EF4444",marginTop:2}}>₪{ovD.toLocaleString()}</div></div>
            </div>
            {debt.filter(d=>d.status==="באיחור").length===0&&<div style={{color:"#64748B",fontSize:12,textAlign:"center",padding:"8px 0"}}>אין חובות באיחור 🎉</div>}
          </div>}
          <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:18}}>
            <div style={{fontWeight:800,fontSize:14,marginBottom:14}}>🏭 עומס מחלקות</div>
            {(isA?DEPTS:[user.dept]).map((dept,i)=>{
              const dt=tasks.filter(t=>t.dept===dept);const done=dt.filter(t=>t.status==="הושלם").length;const pct=dt.length?Math.round((done/dt.length)*100):0;
              const cols=["#3B82F6","#EC4899","#10B981","#F59E0B","#8B5CF6","#EF4444","#14B8A6"];

          </div>
        </div>
        {isA&&<div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
          {["הכל",...DEPTS].map(d=><button key={d} onClick={()=>setDf(d)} style={{padding:"5px 11px",borderRadius:20,border:"1px solid",borderColor:df===d?"#3B82F6":"rgba(255,255,255,0.1)",background:df===d?"rgba(59,130,246,0.15)":"transparent",color:df===d?"#60A5FA":"#64748B",fontWeight:600,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>{d}</button>)}

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:12}}>
          <div><h1 style={{fontSize:22,fontWeight:900,margin:0}}>אנשי קשר</h1><p style={{color:"#64748B",margin:"3px 0 0",fontSize:12}}>{clients.length} לקוחות</p></div>
          <button onClick={()=>setAddClient(true)} style={{padding:"9px 16px",borderRadius:9,border:"none",background:"linear-gradient(135deg,#10B981,#059669)",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>+ לקוח חדש</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:9}}>
          {clients.map(c=><div key={c.id} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:13,padding:"14px 16px",display:"flex",alignItems:"flex-start",gap:12}}>
            <div style={{width:38,height:38,borderRadius:"50%",background:"linear-gradient(135deg,#3B82F6,#6366F1)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:"#fff",flexShrink:0}}>{c.name[0]}</div>
            <div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,fontSize:14,marginBottom:5}}>{c.name}</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:10}}>
                {c.phone&&<span style={{color:"#94A3B8",fontSize:12}}>📞 {c.phone}</span>}
                {c.email&&<span style={{color:"#94A3B8",fontSize:12}}>✉️ {c.email}</span>}
                {c.address&&<span style={{color:"#94A3B8",fontSize:12}}>📍 {c.address}</span>}
                {c.payment_terms&&<span style={{background:"rgba(59,130,246,0.12)",color:"#60A5FA",fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:20}}>{c.payment_terms}</span>}
              </div>
            </div>
          </div>)}
          {clients.length===0&&!loading&&<div style={{textAlign:"center",padding:"50px 20px",color:"#475569"}}><div style={{fontSize:36,marginBottom:10}}>👥</div><div style={{fontWeight:700,fontSize:14}}>אין לקוחות עדיין</div></div>}
        </div>
      </div>}

      {tab==="debt"&&isA&&<DebtTab debt={debt} notify={notify}/>}
    </div>

    <Modal open={addTask} onClose={()=>setAddTask(false)}>
      <div style={{fontWeight:800,fontSize:16,marginBottom:18}}>+ משימה חדשה</div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div><label style={LS}>כותרת *</label><input style={IS} value={nt.title} onChange={e=>setNt(p=>({...p,title:e.target.value}))} placeholder="תיאור המשימה..."/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}}>
          <div><label style={LS}>מחלקה</label><select style={IS} value={nt.dept} onChange={e=>setNt(p=>({...p,dept:e.target.value,assignee:""}))}>
            {DEPTS.map(d=><option key={d} value={d}>{d}</option>)}</select></div>
          <div><label style={LS}>עדיפות</label><select style={IS} value={nt.priority} onChange={e=>setNt(p=>({...p,priority:e.target.value}))}>
            {["גבוהה","בינונית","נמוכה"].map(p=><option key={p} value={p}>{p}</option>)}</select></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}}>
          <div><label style={LS}>לקוח</label><select style={IS} value={nt.client_name} onChange={e=>setNt(p=>({...p,client_name:e.target.value}))}>
            <option value="">בחר לקוח...</option>{clients.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}</select></div>
          <div><label style={LS}>אחראי</label><select style={IS} value={nt.assignee} onChange={e=>setNt(p=>({...p,assignee:e.target.value}))}>
            <option value="">בחר עובד...</option>
            {allUsers.filter(u=>u.dept===nt.dept).map(u=><option key={u.id} value={u.name}>{u.name}</option>)}
          </select></div>
        </div>
        <div><label style={LS}>תאריך יעד</label><input type="date" style={IS} value={nt.due_date} onChange={e=>setNt(p=>({...p,due_date:e.target.value}))}/></div>
        {nt.dept==="משלוחים"&&<div style={{background:"rgba(59,130,246,0.06)",border:"1px solid rgba(59,130,246,0.2)",borderRadius:10,padding:12}}>
          <div style={{color:"#60A5FA",fontSize:11,fontWeight:700,marginBottom:10}}>🚚 פרטי משלוח</div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div><label style={LS}>כתובת יעד</label><input style={IS} value={nt.address} onChange={e=>setNt(p=>({...p,address:e.target.value}))} placeholder="רחוב, עיר"/></div>
            <div><label style={LS}>טלפון לקוח</label><input style={IS} value={nt.phone} onChange={e=>setNt(p=>({...p,phone:e.target.value}))} placeholder="050-0000000" type="tel"/></div>
          </div>
        </div>}
        <div><label style={LS}>הערות</label><input style={IS} value={nt.notes} onChange={e=>setNt(p=>({...p,notes:e.target.value}))} placeholder="הערות..."/></div>
        <div style={{display:"flex",gap:9}}>
          <button onClick={doAddTask} style={{flex:1,padding:"11px",borderRadius:9,border:"none",background:"linear-gradient(135deg,#3B82F6,#6366F1)",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>הוסף</button>
          <button onClick={()=>setAddTask(false)} style={{padding:"11px 14px",borderRadius:9,border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:"#64748B",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>ביטול</button>
        </div>
      </div>
    </Modal>

    <Modal open={addClient} onClose={()=>setAddClient(false)}>
      <div style={{fontWeight:800,fontSize:16,marginBottom:18}}>+ לקוח חדש</div>
      <div style={{display:"flex",flexDirection:"column",gap:12}}>
        <div><label style={LS}>שם *</label><input style={IS} value={nc.name} onChange={e=>setNc(p=>({...p,name:e.target.value}))} placeholder="שם חברה / לקוח"/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}}>
          <div><label style={LS}>טלפון</label><input style={IS} value={nc.phone} onChange={e=>setNc(p=>({...p,phone:e.target.value}))} placeholder="050-0000000"/></div>
          <div><label style={LS}>מייל</label><input style={IS} value={nc.email} onChange={e=>setNc(p=>({...p,email:e.target.value}))} placeholder="name@co.il"/></div>
        </div>
        <div><label style={LS}>כתובת</label><input style={IS} value={nc.address} onChange={e=>setNc(p=>({...p,address:e.target.value}))} placeholder="רחוב, עיר"/></div>
        <div><label style={LS}>תנאי תשלום</label><select style={IS} value={nc.payment_terms} onChange={e=>setNc(p=>({...p,payment_terms:e.target.value}))}>
          {["שוטף","שוטף + 30","שוטף + 60","שוטף + 90","מזומן"].map(t=><option key={t} value={t}>{t}</option>)}</select></div>
        <div style={{display:"flex",gap:9}}>
          <button onClick={doAddClient} style={{flex:1,padding:"11px",borderRadius:9,border:"none",background:"linear-gradient(135deg,#10B981,#059669)",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>הוסף</button>
          <button onClick={()=>setAddClient(false)} style={{padding:"11px 14px",borderRadius:9,border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:"#64748B",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>ביטול</button>
        </div>
      </div>
    </Modal>

    <Modal open={!!det} onClose={()=>setDet(null)}>
      {det&&<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
          <div style={{flex:1,paddingLeft:10}}><div style={{fontWeight:800,fontSize:15,marginBottom:8}}>{det.title}</div><Badge status={det.status}/></div>
          <button onClick={()=>setDet(null)} style={{background:"none",border:"none",color:"#64748B",fontSize:18,cursor:"pointer"}}>✕</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:16}}>
          {[["לקוח",det.client_name],["מחלקה",det.dept],["אחראי",det.assignee],["עדיפות",det.priority],["תאריך",det.due_date],["הערות",det.notes]].filter(([,v])=>v).map(([l,v])=><div key={l} style={{background:"rgba(255,255,255,0.05)",borderRadius:9,padding:"9px 11px"}}><div style={{color:"#64748B",fontSize:10,fontWeight:700,marginBottom:2}}>{l}</div><div style={{fontWeight:600,fontSize:12}}>{v}</div></div>)}
        </div>
        <label style={LS}>עדכן סטטוס</label>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
          {Object.keys(SC).map(s=><button key={s} onClick={()=>updStatus(det.id,s)} style={{padding:"9px",borderRadius:8,border:"1px solid",borderColor:det.status===s?SC[s].c:"rgba(255,255,255,0.1)",background:det.status===s?SC[s].bg:"transparent",color:det.status===s?SC[s].c:"#64748B",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>{s}</button>)}
        </div>
      </div>}
    </Modal>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
