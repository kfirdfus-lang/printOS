<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef}=React;
const SU="https://pvwcpukfhyrmdpxgfwrk.supabase.co";
const SA="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2d2NwdWtmaHlybWRweGdmd3JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NzIzNzMsImV4cCI6MjA5MjQ0ODM3M30.69GpTOQdwtAgouGN0MIHqQc6bImxAbfQ72xL2S4KaoM";

const sb=async(path,o={})=>{
  const r=await fetch(`${SU}/rest/v1/${path}`,{headers:{apikey:SA,Authorization:`Bearer ${SA}`,"Content-Type":"application/json",Prefer:o.prefer||"return=representation",...o.headers},method:o.method||"GET",body:o.body});
  const t=await r.text();if(!r.ok)throw new Error(t);return t?JSON.parse(t):[];
};

const DEPTS=["פורמט רחב","דיגיטלי צבעוני","דיגיטלי שחור לבן","אופסט","עבודות חוץ","משלוחים","תזכורות","ביגוד ומוצרי פרסום"];

const DEPT_COLORS={
  "פורמט רחב":"#2563EB","דיגיטלי צבעוני":"#7C3AED","דיגיטלי שחור לבן":"#475569",
  "אופסט":"#D97706","עבודות חוץ":"#16A34A","משלוחים":"#DC2626","תזכורות":"#0891B2"
};

const SC={
  "ממתין":{c:"#D97706",bg:"#FFFBEB",border:"#FDE68A"},
  "בביצוע":{c:"#2563EB",bg:"#EFF6FF",border:"#BFDBFE"},
  "הושלם":{c:"#16A34A",bg:"#F0FDF4",border:"#BBF7D0"},
  "תקוע":{c:"#DC2626",bg:"#FEF2F2",border:"#FECACA"},
};

const PR={
  "גבוהה":{c:"#DC2626",bg:"#FEF2F2",label:"גבוהה"},
  "בינונית":{c:"#D97706",bg:"#FFFBEB",label:"בינונית"},
  "נמוכה":{c:"#16A34A",bg:"#F0FDF4",label:"נמוכה"},
};

// ── UI Components ──
const Badge=({status})=>{
  const s=SC[status]||{c:"#475569",bg:"#F1F5F9",border:"#E2E8F0"};
  return<span style={{background:s.bg,color:s.c,border:`1px solid ${s.border}`,borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:600,display:"inline-flex",alignItems:"center",gap:4,whiteSpace:"nowrap",flexShrink:0}}>
    <span style={{width:5,height:5,borderRadius:"50%",background:s.c,flexShrink:0}}/>
    {status}
  </span>;
};

const PriBadge=({p})=>{
  const s=PR[p]||PR["נמוכה"];
  return<span style={{background:s.bg,color:s.c,borderRadius:20,padding:"2px 8px",fontSize:11,fontWeight:600,flexShrink:0}}>{s.label}</span>;
};

const Av=({u,sz=36})=>{
  const color=u.color||"#2563EB";
  const ini=u.initials||(u.name?u.name[0]:"?");
  return<div style={{width:sz,height:sz,borderRadius:"50%",background:color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:sz*0.36,fontWeight:700,color:"#fff",flexShrink:0,letterSpacing:"-0.5px"}}>{ini}</div>;
};

const Spinner=({sz=20,color="#2563EB"})=><div style={{width:sz,height:sz,border:`2px solid #E2E8F0`,borderTop:`2px solid ${color}`,borderRadius:"50%",animation:"spin 0.7s linear infinite",flexShrink:0}}/>;

const Card=({children,style={}})=><div style={{background:"#fff",border:"1px solid var(--border)",borderRadius:16,boxShadow:"var(--shadow)",padding:20,...style}}>{children}</div>;

const Modal=({open,onClose,children,title})=>!open?null:
  <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.4)",backdropFilter:"blur(4px)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
    <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:20,padding:28,width:"100%",maxWidth:520,maxHeight:"90vh",overflowY:"auto",boxShadow:"var(--shadow-lg)"}}>
      {title&&<div style={{fontWeight:800,fontSize:17,color:"var(--text)",marginBottom:20,paddingBottom:16,borderBottom:"1px solid var(--border)"}}>{title}</div>}
      {children}
    </div>
  </div>;

// ── LOGIN ──
function Login({onLogin}){
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(true);
  const [sel,setSel]=useState(null);

  useEffect(()=>{
    sb("users?order=role.desc,name.asc").then(u=>{setUsers(u);setLoading(false);}).catch(()=>setLoading(false));
  },[]);

  const admin=users.filter(u=>u.role==="admin");
  const workers=users.filter(u=>u.role==="worker");

  if(loading)return<div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",alignItems:"center",justifyContent:"center"}}><Spinner sz={36}/></div>;

  return<div style={{minHeight:"100vh",background:"linear-gradient(135deg,#EFF6FF 0%,#F8FAFC 50%,#F0FDF4 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:"24px 16px"}}>
    <div style={{width:"100%",maxWidth:640,animation:"fadeUp 0.4s ease"}}>

      {/* Logo */}
      <div style={{textAlign:"center",marginBottom:40}}>
        <div style={{width:64,height:64,borderRadius:18,background:"linear-gradient(135deg,#2563EB,#7C3AED)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,margin:"0 auto 16px",boxShadow:"0 8px 24px rgba(37,99,235,0.25)"}}>🖨️</div>
        <h1 style={{fontSize:28,fontWeight:900,color:"var(--text)",margin:"0 0 6px",letterSpacing:"-0.5px"}}>PrintOS</h1>
        <p style={{color:"var(--text3)",fontSize:14}}>בחר את הפרופיל שלך להמשך</p>
      </div>

      {/* Admin */}
      {admin.length>0&&<div style={{marginBottom:24}}>
        <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",letterSpacing:"0.08em",marginBottom:10,paddingRight:4}}>מנהלים</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:10}}>
          {admin.map(u=>{
            const isSel=sel===u.id;
            return<button key={u.id} onClick={()=>setSel(u.id)} style={{background:isSel?"#EFF6FF":"#fff",border:`2px solid ${isSel?"#2563EB":"var(--border)"}`,borderRadius:14,padding:"16px 14px",cursor:"pointer",fontFamily:"inherit",textAlign:"center",transition:"all 0.15s",boxShadow:isSel?"0 0 0 4px rgba(37,99,235,0.12)":"var(--shadow)"}}>
              <div style={{width:44,height:44,borderRadius:"50%",background:u.color||"#2563EB",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:700,color:"#fff",margin:"0 auto 10px"}}>{u.initials||u.name?.[0]}</div>
              <div style={{fontWeight:700,fontSize:13,color:"var(--text)",marginBottom:3}}>{u.name}</div>
              <div style={{fontSize:11,color:"var(--text3)"}}>👑 מנהל ראשי</div>
              {isSel&&<div style={{marginTop:8,width:20,height:20,borderRadius:"50%",background:"#2563EB",display:"flex",alignItems:"center",justifyContent:"center",margin:"8px auto 0",fontSize:11,color:"#fff",fontWeight:800}}>✓</div>}
            </button>;
          })}
        </div>
      </div>}

      {/* Workers */}
      <div style={{marginBottom:28}}>
        <div style={{fontSize:11,fontWeight:700,color:"var(--text3)",letterSpacing:"0.08em",marginBottom:10,paddingRight:4}}>עובדים</div>
        <div className="login-grid" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
          {workers.map(u=>{
            const isSel=sel===u.id;
            const color=u.color||DEPT_COLORS[u.dept]||"#475569";
            return<button key={u.id} onClick={()=>setSel(u.id)} style={{background:isSel?`${color}0D`:"#fff",border:`2px solid ${isSel?color:"var(--border)"}`,borderRadius:14,padding:"14px 12px",cursor:"pointer",fontFamily:"inherit",textAlign:"center",transition:"all 0.15s",boxShadow:isSel?`0 0 0 4px ${color}20`:"var(--shadow)"}}>
              <div style={{width:40,height:40,borderRadius:"50%",background:color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,color:"#fff",margin:"0 auto 8px"}}>{u.initials||u.name?.[0]}</div>
              <div style={{fontWeight:700,fontSize:12,color:"var(--text)",marginBottom:2}}>{u.name}</div>
              <div style={{fontSize:10,color:color,fontWeight:600,background:`${color}15`,borderRadius:20,padding:"2px 6px",display:"inline-block"}}>{u.dept}</div>
              {isSel&&<div style={{marginTop:6,width:18,height:18,borderRadius:"50%",background:color,display:"flex",alignItems:"center",justifyContent:"center",margin:"6px auto 0",fontSize:10,color:"#fff",fontWeight:800}}>✓</div>}
            </button>;
          })}
        </div>
      </div>

      <button onClick={()=>{const u=users.find(u=>u.id===sel);if(u)onLogin(u);}} disabled={!sel} style={{width:"100%",padding:"14px",borderRadius:14,border:"none",background:sel?"linear-gradient(135deg,#2563EB,#7C3AED)":"var(--bg3)",color:sel?"#fff":"var(--text3)",fontWeight:700,fontSize:15,cursor:sel?"pointer":"not-allowed",fontFamily:"inherit",boxShadow:sel?"0 4px 16px rgba(37,99,235,0.3)":"none",transition:"all 0.2s"}}>
        {sel?`כניסה כ-${users.find(u=>u.id===sel)?.name}`:"בחר פרופיל להמשך"}
      </button>
    </div>
  </div>;
}

// ── DEBT TAB ──
function DebtTab({debt,notify}){
  const [filter,setFilter]=useState("הכל");
  const [expanded,setExpanded]=useState(null);
  const [editing,setEditing]=useState(null);
  const [editData,setEditData]=useState({payment_status:"ממתין",payment_notes:""});
  const [local,setLocal]=useState(debt);
  useEffect(()=>setLocal(debt),[debt]);

  const PS={
    "ממתין":{c:"#D97706",bg:"#FFFBEB"},
    "בטיפול":{c:"#2563EB",bg:"#EFF6FF"},
    "הבטיח תשלום":{c:"#7C3AED",bg:"#F5F3FF"},
    "שולם":{c:"#16A34A",bg:"#F0FDF4"},
  };

  // Group by client
  const byClient={};
  local.forEach(d=>{
    const n=d.client_name;
    if(!byClient[n]) byClient[n]={invoices:[],overdue:0,current:0,maxDays:0,payment_status:d.payment_status,payment_notes:d.payment_notes};
    byClient[n].invoices.push(d);
    if(d.status==="באיחור"){byClient[n].overdue+=Number(d.amount);byClient[n].maxDays=Math.max(byClient[n].maxDays,d.days_overdue);}
    else byClient[n].current+=Number(d.amount);
  });

  const clients=Object.entries(byClient).map(([name,d])=>({
    name,
    total:d.overdue+d.current,
    overdue:d.overdue,
    current:d.current,
    maxDays:d.maxDays,
    status:d.overdue>0?"באיחור":"שוטף",
    invoices:d.invoices.sort((a,b)=>b.days_overdue-a.days_overdue),
    payment_status:d.payment_status,
    payment_notes:d.payment_notes,
  }));

  const overdueClients=clients.filter(c=>c.status==="באיחור").sort((a,b)=>b.overdue-a.overdue);
  const currentClients=clients.filter(c=>c.status==="שוטף").sort((a,b)=>b.total-a.total);
  const shown=filter==="הכל"?[...overdueClients,...currentClients]:filter==="באיחור"?overdueClients:currentClients;

  const totAll=clients.reduce((s,c)=>s+c.total,0);
  const totOv=clients.reduce((s,c)=>s+c.overdue,0);

  const saveEdit=async(clientName)=>{
    try{
      const ids=local.filter(d=>d.client_name===clientName).map(d=>d.id);
      for(const id of ids){
        await sb(`debt?id=eq.${id}`,{method:"PATCH",body:JSON.stringify(editData)});
      }
      setLocal(p=>p.map(d=>d.client_name===clientName?{...d,...editData}:d));
      setEditing(null);notify("✅ עודכן!");
    }catch{notify("שגיאה","#DC2626");}
  };

  const exportExcel=()=>{
    try{
      const XLSX=window.XLSX;const wb=XLSX.utils.book_new();
      const makeSheet=(rows,name)=>{
        const ws=XLSX.utils.aoa_to_sheet(rows);
        ws['!cols']=[{wch:36},{wch:14},{wch:14},{wch:14},{wch:12},{wch:14},{wch:32}];
        XLSX.utils.book_append_sheet(wb,ws,name);
      };
      makeSheet([
        ["דוח גבייה","","","","","",""],
        ["לקוח","מספר חשבונית","תאריך חשבונית","תאריך פירעון","ימי איחור","סכום (₪)","סטטוס"],
        ...local.map(d=>[d.client_name,d.invoice_number||"",d.invoice_date||"",d.due_date||"",d.days_overdue||0,Number(d.amount),d.status]),
        ["סה״כ","","","","",totAll,""]
      ],"סיכום");
      makeSheet([
        ["חייבים באיחור","","","","","",""],
        ["לקוח","מספר חשבונית","תאריך חשבונית","תאריך פירעון","ימי איחור","סכום (₪)","סטטוס טיפול"],
        ...local.filter(d=>d.status==="באיחור").map(d=>[d.client_name,d.invoice_number||"",d.invoice_date||"",d.due_date||"",d.days_overdue,Number(d.amount),d.payment_status||"ממתין"]),
        ["סה״כ","","","","",totOv,""]
      ],"חייבים באיחור");
      XLSX.writeFile(wb,"דוח_גבייה.xlsx");
      notify("📥 הדוח הורד!","#16A34A");
    }catch(e){notify("שגיאה","#DC2626");}
  };

  const IS={background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:8,padding:"9px 12px",color:"var(--text)",fontSize:13,width:"100%",outline:"none",fontFamily:"inherit",direction:"rtl"};
  const LS={color:"var(--text3)",fontSize:11,fontWeight:700,marginBottom:5,display:"block"};

  return<div>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24,flexWrap:"wrap",gap:12}}>
      <div><h1 style={{fontSize:22,fontWeight:800,color:"var(--text)",margin:0}}>מערכת גבייה</h1><p style={{color:"var(--text3)",margin:"3px 0 0",fontSize:13}}>{clients.length} לקוחות • {local.length} חשבוניות</p></div>
      <button onClick={exportExcel} style={{padding:"9px 18px",borderRadius:10,border:"none",background:"#16A34A",color:"#fff",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:6}}>📥 הורד דוח אקסל</button>
    </div>

    <div className="kg3" style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:14,marginBottom:20}}>
      {[
        {lb:"סה״כ חוב",v:`₪${Math.round(totAll).toLocaleString()}`,c:"var(--blue)",bg:"var(--blue-light)",ic:"📊"},
        {lb:"באיחור",v:`₪${Math.round(totOv).toLocaleString()}`,c:"var(--red)",bg:"var(--red-light)",ic:"🚨"},
        {lb:"לקוחות",v:clients.length,c:"var(--purple)",bg:"#F5F3FF",ic:"👥"},
      ].map((x,i)=><div key={i} style={{background:x.bg,border:`1px solid ${x.c}22`,borderRadius:14,padding:"18px 16px"}}>
        <div style={{fontSize:20,marginBottom:8}}>{x.ic}</div>
        <div style={{fontSize:22,fontWeight:800,color:x.c}}>{x.v}</div>
        <div style={{fontSize:12,color:"var(--text3)",marginTop:4,fontWeight:500}}>{x.lb}</div>
      </div>)}
    </div>

    <div style={{display:"flex",gap:6,marginBottom:16}}>
      {["הכל","באיחור","שוטף"].map(f=><button key={f} onClick={()=>setFilter(f)} style={{padding:"6px 16px",borderRadius:20,border:`1px solid ${filter===f?"#2563EB":"var(--border)"}`,background:filter===f?"#2563EB":"#fff",color:filter===f?"#fff":"var(--text2)",fontWeight:600,fontSize:12,cursor:"pointer",fontFamily:"inherit",transition:"all 0.15s"}}>
        {f} ({f==="באיחור"?overdueClients.length:f==="שוטף"?currentClients.length:clients.length})
      </button>)}
    </div>

    <div style={{display:"flex",flexDirection:"column",gap:10}}>
      {shown.map(c=>{
        const isOv=c.status==="באיחור";
        const isExp=expanded===c.name;
        const isEdit=editing===c.name;
        const ps=PS[c.payment_status||"ממתין"]||PS["ממתין"];
        return<div key={c.name} style={{background:"#fff",border:`1px solid ${isOv?"#FECACA":"var(--border)"}`,borderRadius:14,boxShadow:"var(--shadow)",borderRight:isOv?"4px solid #DC2626":"4px solid #16A34A",overflow:"hidden"}}>
          
          {/* Client header */}
          <div style={{padding:"14px 16px",cursor:"pointer"}} onClick={()=>setExpanded(isExp?null:c.name)}>
            <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:14,color:"var(--text)",marginBottom:6}}>{c.name}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
                  <span style={{fontWeight:800,color:isOv?"var(--red)":"var(--green)",fontSize:15}}>₪{Math.round(c.total).toLocaleString()}</span>
                  {isOv&&c.overdue>0&&<span style={{color:"var(--red)",fontSize:12}}>• באיחור ₪{Math.round(c.overdue).toLocaleString()}</span>}
                  {isOv&&c.current>0&&<span style={{color:"var(--green)",fontSize:12}}>• שוטף ₪{Math.round(c.current).toLocaleString()}</span>}
                  <span style={{background:ps.bg,color:ps.c,borderRadius:20,padding:"2px 9px",fontSize:11,fontWeight:600}}>{c.payment_status||"ממתין"}</span>
                </div>
                {c.payment_notes&&<div style={{marginTop:6,padding:"6px 10px",background:"var(--bg2)",borderRadius:8,fontSize:12,color:"var(--text2)",borderRight:"3px solid #7C3AED"}}>💬 {c.payment_notes}</div>}
              </div>
              <div style={{display:"flex",gap:6,flexShrink:0}}>
                <button onClick={e=>{e.stopPropagation();isEdit?setEditing(null):(setEditing(c.name),setEditData({payment_status:c.payment_status||"ממתין",payment_notes:c.payment_notes||""}));}} style={{padding:"6px 10px",borderRadius:8,border:"1px solid var(--border)",background:isEdit?"var(--red-light)":"var(--bg2)",color:isEdit?"var(--red)":"var(--text2)",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
                  {isEdit?"✕":"✏️"}
                </button>

// ── AI CHAT ──
function AiChat({user,tasks,clients,onRefresh,onClose}){
  const [msgs,setMsgs]=useState([{role:"ai",text:`שלום ${user.name.split(" ")[0]}! 👋\nאני עוזר ה-AI של PrintOS.\n\nתוכל לבקש ממני:\n• להוסיף משימות\n• לעדכן סטטוסים\n• לשאול על נתונים\n\nמה תרצה?`}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef(null);
  useEffect(()=>bottomRef.current?.scrollIntoView({behavior:"smooth"}),[msgs]);

  const send=async()=>{
    if(!input.trim()||loading)return;
    const txt=input.trim();
    setInput("");
    setMsgs(p=>[...p,{role:"user",text:txt}]);
    setLoading(true);

    const system=`אתה עוזר AI לניהול בית דפוס PrintOS. עונה בעברית בלבד, קצר וברור.
משתמש: ${user.name} | ${user.role==="admin"?"מנהל":"עובד ב-"+user.dept}
מחלקות: ${DEPTS.join(", ")}
משימות קיימות (${tasks.length}): ${tasks.slice(0,10).map(t=>`[${t.id?.slice(0,6)}] ${t.title}|${t.dept}|${t.status}`).join(" | ")}
לקוחות: ${clients.slice(0,10).map(c=>c.name).join(", ")}

כשצריך לבצע פעולה, כלול JSON בתוך \`\`\`json ... \`\`\`:
{ "action": "add_task"|"update_status"|"none", "data": {...}, "message": "תשובה" }

add_task: data={title,dept,priority,client_name,assignee,due_date,notes}
update_status: data={task_id(6תווים),status}`;

    try{
      const res=await fetch("/api/claude",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:600,
          system,
          messages:[
            ...msgs.filter(m=>m.role!=="ai"||msgs.indexOf(m)>0).slice(-6).map(m=>({role:m.role==="user"?"user":"assistant",content:m.text})),
            {role:"user",content:txt}
          ]
        })
      });
      const data=await res.json();
      const raw=data.content?.[0]?.text||"מצטער, לא הצלחתי להבין.";
      const match=raw.match(/```json\s*([\s\S]*?)\s*```/);
      let action=null;
      if(match){try{action=JSON.parse(match[1]);}catch{}}
      const reply=action?.message||raw.replace(/```json[\s\S]*?```/g,"").trim();
      setMsgs(p=>[...p,{role:"ai",text:reply}]);

      if(action?.action==="add_task"&&action.data?.title){
        const d=action.data;
        await sb("tasks",{method:"POST",body:JSON.stringify({title:d.title,dept:d.dept||user.dept||DEPTS[0],priority:d.priority||"בינונית",status:"ממתין",client_name:d.client_name||"",assignee:d.assignee||"",due_date:d.due_date||null,notes:d.notes||"",created_by:user.name})});
        onRefresh();
        setMsgs(p=>[...p,{role:"ai",text:`✅ המשימה "${d.title}" נוספה!`}]);
      }
      if(action?.action==="update_status"&&action.data){
        const task=tasks.find(t=>t.id?.startsWith(action.data.task_id));
        if(task){
          await sb(`tasks?id=eq.${task.id}`,{method:"PATCH",body:JSON.stringify({status:action.data.status})});
          onRefresh();
          setMsgs(p=>[...p,{role:"ai",text:`✅ סטטוס עודכן ל-"${action.data.status}"`}]);
        }
      }
    }catch(e){
      setMsgs(p=>[...p,{role:"ai",text:"מצטער, הייתה שגיאה. נסה שוב."}]);
    }
    setLoading(false);
  };

  const suggestions=["הוסף משימה למשלוחים","מה תקוע?","כמה משימות פתוחות?","עדכן סטטוס"];

  return<div style={{position:"fixed",bottom:0,left:0,width:"min(400px,100vw)",height:"min(560px,90vh)",background:"#fff",border:"1px solid var(--border)",borderRadius:"20px 20px 0 0",zIndex:500,display:"flex",flexDirection:"column",boxShadow:"0 -8px 40px rgba(0,0,0,0.12)"}}>
    {/* Header */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 18px",borderBottom:"1px solid var(--border)",flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:32,height:32,borderRadius:"50%",background:"linear-gradient(135deg,#2563EB,#7C3AED)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🤖</div>
        <div><div style={{fontWeight:700,fontSize:14,color:"var(--text)"}}>עוזר AI</div><div style={{fontSize:11,color:"var(--text3)"}}>מזין משימות ועונה על שאלות</div></div>
      </div>
      <button onClick={onClose} style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:8,color:"var(--text2)",cursor:"pointer",width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>✕</button>
    </div>

    {/* Messages */}
    <div style={{flex:1,overflowY:"auto",padding:"14px 16px",display:"flex",flexDirection:"column",gap:10}}>
      {msgs.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-start":"flex-end"}}>
        <div style={{maxWidth:"82%",padding:"9px 13px",borderRadius:m.role==="user"?"13px 13px 4px 13px":"13px 13px 13px 4px",background:m.role==="user"?"var(--blue-light)":"var(--bg2)",border:`1px solid ${m.role==="user"?"var(--blue-mid)":"var(--border)"}`,color:"var(--text)",fontSize:13,lineHeight:1.5,whiteSpace:"pre-wrap"}}>
          {m.text}
        </div>
      </div>)}
      {loading&&<div style={{display:"flex",justifyContent:"flex-end"}}>
        <div style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:"13px 13px 13px 4px",padding:"11px 14px",display:"flex",gap:5}}>
          {[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:"var(--blue)",animation:`pulse 1.2s ${i*0.2}s infinite`}}/>)}
        </div>
      </div>}
      <div ref={bottomRef}/>
    </div>

    {/* Suggestions */}
    <div style={{padding:"8px 14px",display:"flex",gap:6,flexWrap:"wrap",borderTop:"1px solid var(--border)",flexShrink:0}}>
      {suggestions.map(s=><button key={s} onClick={()=>setInput(s)} style={{padding:"4px 10px",borderRadius:20,border:"1px solid var(--border)",background:"#fff",color:"var(--text2)",fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>{s}</button>)}
    </div>

    {/* Input */}
    <div style={{padding:"10px 14px 14px",flexShrink:0,display:"flex",gap:8}}>
      <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&send()} placeholder="כתוב בעברית חופשית..." style={{flex:1,background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:10,padding:"9px 13px",color:"var(--text)",fontSize:13,outline:"none",fontFamily:"inherit",direction:"rtl"}}/>
      <button onClick={send} disabled={loading||!input.trim()} style={{padding:"9px 16px",borderRadius:10,border:"none",background:input.trim()?"var(--blue)":"var(--bg3)",color:input.trim()?"#fff":"var(--text3)",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit",flexShrink:0,display:"flex",alignItems:"center"}}>
        {loading?<Spinner sz={16} color="#fff"/>:"שלח"}
      </button>
    </div>
  </div>;
}

// ── CALENDAR TAB ──
function CalendarTab({tasks,user,isA,onTaskClick}){
  const [weekOffset,setWeekOffset]=useState(0);
  const [deptFilter,setDeptFilter]=useState(isA?"הכל":user.dept);

  const getWeekDays=()=>{
    const today=new Date();
    const monday=new Date(today);
    monday.setDate(today.getDate()-today.getDay()+1+weekOffset*7);
    return Array.from({length:7},(_,i)=>{
      const d=new Date(monday);
      d.setDate(monday.getDate()+i);
      return d;
    });
  };

  const days=getWeekDays();
  const todayStr=new Date().toISOString().split('T')[0];

  const dayNames=["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
  const monthNames=["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];

  const getTasksForDay=(dateStr)=>{
    let filtered=tasks.filter(t=>t.due_date===dateStr);
    if(deptFilter!=="הכל") filtered=filtered.filter(t=>t.dept===deptFilter);
    return filtered;
  };

  const weekStart=days[0];
  const weekEnd=days[6];
  const weekLabel=`${weekStart.getDate()} ${monthNames[weekStart.getMonth()]} — ${weekEnd.getDate()} ${monthNames[weekEnd.getMonth()]} ${weekEnd.getFullYear()}`;

  return<div>
    <div style={{marginBottom:20}}>
      <h1 style={{fontSize:22,fontWeight:800,color:"var(--text)",margin:0}}>לוח שנה 📅</h1>
      <p style={{color:"var(--text3)",margin:"5px 0 0",fontSize:13}}>{weekLabel}</p>
    </div>

    {/* Controls */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:12}}>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setWeekOffset(p=>p-1)} style={{padding:"7px 14px",borderRadius:8,border:"1px solid var(--border)",background:"#fff",cursor:"pointer",fontFamily:"inherit",fontSize:13}}>← שבוע קודם</button>
        <button onClick={()=>setWeekOffset(0)} style={{padding:"7px 14px",borderRadius:8,border:"1px solid var(--border)",background:weekOffset===0?"var(--blue-light)":"#fff",color:weekOffset===0?"var(--blue)":"var(--text2)",cursor:"pointer",fontFamily:"inherit",fontSize:13,fontWeight:600}}>היום</button>
        <button onClick={()=>setWeekOffset(p=>p+1)} style={{padding:"7px 14px",borderRadius:8,border:"1px solid var(--border)",background:"#fff",cursor:"pointer",fontFamily:"inherit",fontSize:13}}>שבוע הבא →</button>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {["הכל",...DEPTS].map(d=><button key={d} onClick={()=>setDeptFilter(d)} style={{padding:"5px 10px",borderRadius:20,border:`1px solid ${deptFilter===d?DEPT_COLORS[d]||"var(--blue)":"var(--border)"}`,background:deptFilter===d?`${DEPT_COLORS[d]||"#2563EB"}15`:"#fff",color:deptFilter===d?DEPT_COLORS[d]||"var(--blue)":"var(--text2)",fontWeight:600,fontSize:11,cursor:"pointer",fontFamily:"inherit"}}>{d}</button>)}
      </div>
    </div>

    {/* Week grid */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:8}}>
      {days.map((day,i)=>{
        const dateStr=day.toISOString().split('T')[0];
        const dayTasks=getTasksForDay(dateStr);
        const isToday=dateStr===todayStr;
        const isWeekend=day.getDay()===5||day.getDay()===6;

        return<div key={dateStr} style={{background:isToday?"var(--blue-light)":isWeekend?"var(--bg2)":"#fff",border:`1px solid ${isToday?"var(--blue-mid)":"var(--border)"}`,borderRadius:12,padding:10,minHeight:140}}>
          <div style={{marginBottom:8,textAlign:"center"}}>
            <div style={{fontSize:11,fontWeight:600,color:isToday?"var(--blue)":"var(--text3)"}}>{dayNames[day.getDay()]}</div>
            <div style={{width:28,height:28,borderRadius:"50%",background:isToday?"var(--blue)":"transparent",color:isToday?"#fff":"var(--text)",fontWeight:isToday?800:600,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",margin:"2px auto 0"}}>{day.getDate()}</div>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {dayTasks.map(t=>{
              const sc=SC[t.status]||{c:"#475569",bg:"#F1F5F9"};
              return<div key={t.id} onClick={()=>onTaskClick(t)} style={{padding:"4px 7px",borderRadius:6,background:sc.bg,borderRight:`3px solid ${DEPT_COLORS[t.dept]||sc.c}`,cursor:"pointer",fontSize:10,fontWeight:600,color:sc.c,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={t.title}>
                {t.title}
              </div>;
            })}
            {dayTasks.length===0&&<div style={{fontSize:10,color:"var(--text3)",textAlign:"center",paddingTop:8}}>—</div>}
          </div>
        </div>;
      })}
    </div>
  </div>;
}

// ── DELIVERY TAB ──
function DeliveryTab({tasks}){
  const DRIVERS=["חיים","ניסן/ברק","טייגר","עומרי"];
  const today=new Date();
  const days=[];
  for(let i=0;i<4;i++){
    const d=new Date(today);
    d.setDate(d.getDate()+i);
    days.push(d.toISOString().split('T')[0]);

  const deliveries=tasks.filter(t=>t.dept==="משלוחים"&&t.due_date&&days.includes(t.due_date));

  const printPDF=(driver)=>{
    const driverTasks=deliveries.filter(t=>t.driver===driver).sort((a,b)=>a.due_date.localeCompare(b.due_date));
    const win=window.open('','_blank');
    const html=`<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8">
    <style>
      body{font-family:Arial,sans-serif;padding:30px;color:#0F172A;direction:rtl}

      @media print{body{padding:15px}}

    <h1>🚚 דוח משלוחים — ${driver}</h1>
    <div class="date">הופק: ${today.toLocaleDateString('he-IL')} | ${driverTasks.length} משלוחים</div>

        <div class="delivery-title">${t.title}</div>
        <div class="delivery-date">📅 ${t.due_date}</div>
        ${t.client_name?`<div class="detail"><strong>לקוח:</strong> ${t.client_name}</div>`:''}
        ${t.notes?`<div class="detail"><strong>פרטים:</strong> ${t.notes}</div>`:''}
        ${t.notes&&t.notes.includes('📍')?`<div style="margin-top:8px"><a href="https://waze.com/ul?q=${encodeURIComponent(t.notes.match(/📍\s*([^|]+)/)?.[1]||'')}&navigate=yes" style="display:inline-flex;align-items:center;gap:6px;background:#00D4FF;color:#000;padding:6px 14px;border-radius:20px;text-decoration:none;font-size:12px;font-weight:700">🧭 פתח ב-Waze</a></div>`:''}
        <div style="margin-top:10px;padding-top:10px;border-top:1px solid #E2E8F0">
          <div style="display:flex;gap:20px">
            <div style="flex:1;font-size:12px;color:#94A3B8">חתימה: ________________</div>
            <div style="flex:1;font-size:12px;color:#94A3B8">שעת מסירה: ________________</div>
          </div>
        </div>
      </div>`).join('')}
    <script>window.print();<\/script></body></html>`;
    win.document.write(html);
    win.document.close();
  };

  return<div>
    <div style={{marginBottom:24}}>
      <h1 style={{fontSize:22,fontWeight:800,color:"var(--text)",margin:0}}>דוחות נהגים 🚚</h1>
      <p style={{color:"var(--text3)",margin:"5px 0 0",fontSize:13}}>היום + 3 ימים קדימה | {deliveries.length} משלוחים</p>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:16}}>
      {DRIVERS.map(driver=>{
        const dt=deliveries.filter(t=>t.driver===driver).sort((a,b)=>a.due_date.localeCompare(b.due_date));
        return<div key={driver} style={{background:"#fff",border:"1px solid var(--border)",borderRadius:16,padding:20,boxShadow:"var(--shadow)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>

  const [nc,setNc]=useState({name:"",phone:"",email:"",address:"",payment_terms:"שוטף + 30"});

  const notify=(m,c="#16A34A")=>{setNotif({m,c});setTimeout(()=>setNotif(null),3000);};

  const load=async(u)=>{
    const cu=u||user;if(!cu)return;
    setLoading(true);
    try{
      const isA=cu.role==="admin";
      const tp=isA?"tasks?order=created_at.desc":`tasks?order=created_at.desc`;
      const [t,c,d]=await Promise.all([sb(tp),sb("clients?order=name.asc"),isA?sb("debt?order=days_overdue.desc"):Promise.resolve([])]);
      setTasks(t);setClients(c);setDebt(d);
      sb("users?role=eq.worker&order=name.asc").then(setAllUsers).catch(()=>{});
    }catch(e){notify("שגיאה בטעינה","#DC2626");}
    setLoading(false);
  };

  const isA=user?.role==="admin";
  const visTasks=(deptFilter!=="הכל")?tasks.filter(t=>t.dept===deptFilter):tasks;
  const byS=s=>tasks.filter(t=>t.status===s).length;
  const totD=debt.reduce((s,d)=>s+Number(d.amount),0);
  const ovD=debt.filter(d=>d.status==="באיחור").reduce((s,d)=>s+Number(d.amount),0);

  const doAddTask=async()=>{
    if(!nt.title.trim())return;
    try{
      let notes=nt.notes||"";
      if(nt.dept==="משלוחים"){
        const p=[];
        if(nt.address)p.push(`📍 ${nt.address}`);
        if(nt.phone)p.push(`📞 ${nt.phone}`);
        if(p.length)notes=(p.join(" | ")+(notes?" | "+notes:""));
      }
      await sb("tasks",{method:"POST",body:JSON.stringify({title:nt.title,dept:nt.dept,priority:nt.priority,client_name:nt.client_name,assignee:nt.assignee,due_date:nt.due_date||null,notes,status:nt.status,created_by:user.name,driver:nt.driver||null,contact:nt.contact||null})});
      window.sendAlert(
        `משימה חדשה נוצרה: ${nt.title}`,
        `משימה חדשה נוצרה במערכת PrintOS:\n\nכותרת: ${nt.title}\nמחלקה: ${nt.dept}\nלקוח: ${nt.client_name||"—"}\nאחראי: ${nt.assignee||"—"}\nעדיפות: ${nt.priority}\nתאריך יעד: ${nt.due_date||"—"}\nנוצר ע"י: ${user.name}`
      ).catch(()=>{});
      setNt({title:"",dept:DEPTS[0],priority:"בינונית",client_name:"",assignee:"",due_date:"",notes:"",status:"ממתין",address:"",phone:""});
      setAddTask(false);await load();notify("✅ משימה נוספה");
    }catch{notify("שגיאה","#DC2626");}
  };

  const doAddClient=async()=>{
    if(!nc.name.trim())return;
    try{
      await sb("clients",{method:"POST",body:JSON.stringify(nc)});
      setNc({name:"",phone:"",email:"",address:"",payment_terms:"שוטף + 30"});
      setAddClient(false);await load();notify("✅ לקוח נוסף");
    }catch{notify("שגיאה","#DC2626");}
  };

  const deleteTask=async(id)=>{
    if(!window.confirm("למחוק את המשימה?"))return;
    try{
      await sb(`tasks?id=eq.${id}`,{method:"DELETE"});
      setTasks(p=>p.filter(t=>t.id!==id));
      notify("🗑️ המשימה נמחקה");
    }catch{notify("שגיאה","#DC2626");}
  };

  const doEditTask=async()=>{
    if(!editTask||!editTask.title.trim())return;
    try{
      await sb(`tasks?id=eq.${editTask.id}`,{method:"PATCH",body:JSON.stringify({title:editTask.title,dept:editTask.dept,priority:editTask.priority,client_name:editTask.client_name,assignee:editTask.assignee,due_date:editTask.due_date||null,notes:editTask.notes,status:editTask.status})});
      setTasks(p=>p.map(t=>t.id===editTask.id?{...t,...editTask}:t));
      setEditTask(null);
      notify("✅ משימה עודכנה");
    }catch{notify("שגיאה","#DC2626");}
  };

  const updStatus=async(id,s)=>{
    try{
      await sb(`tasks?id=eq.${id}`,{method:"PATCH",body:JSON.stringify({status:s})});
      setTasks(p=>p.map(t=>t.id===id?{...t,status:s}:t));
      if(det?.id===id)setDet(p=>({...p,status:s}));
      const task=tasks.find(t=>t.id===id);
      if(s==="הושלם"&&task){
        window.sendAlert(
          `✅ משימה הושלמה: ${task.title}`,
          `משימה הושלמה במערכת PrintOS:\n\nכותרת: ${task.title}\nמחלקה: ${task.dept}\nלקוח: ${task.client_name||"—"}\nאחראי: ${task.assignee||"—"}`
        ).catch(()=>{});
      }
      if(s==="תקוע"&&task){
        window.sendAlert(
          `⚠️ משימה תקועה: ${task.title}`,
          `שים לב! משימה עברה לסטטוס תקוע:\n\nכותרת: ${task.title}\nמחלקה: ${task.dept}\nלקוח: ${task.client_name||"—"}\nאחראי: ${task.assignee||"—"}`
        ).catch(()=>{});
      }
      notify(`עודכן: ${s}`);
    }catch{notify("שגיאה","#DC2626");}
  };

  const LS={color:"var(--text3)",fontSize:11,fontWeight:700,marginBottom:5,display:"block"};

  const navs=[
    {id:"dashboard",ic:"⊟",lb:"דשבורד"},
    {id:"tasks",ic:"☑",lb:"משימות"},
    {id:"calendar",ic:"📅",lb:"לוח שנה"},
    {id:"delivery",ic:"🚚",lb:"משלוחים"},
    ...(isA?[{id:"clients",ic:"◎",lb:"לקוחות"},{id:"debt",ic:"₪",lb:"גבייה"}]:[]),
  ];

  if(!user)return<Login onLogin={u=>{setUser(u);load(u);}}/>;

  const SideInner=()=><div style={{display:"flex",flexDirection:"column",height:"100%"}}>
    {/* Logo */}
    <div style={{padding:"20px 18px 16px",borderBottom:"1px solid var(--border)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#2563EB,#7C3AED)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🖨️</div>
        <div><div style={{fontWeight:800,fontSize:15,color:"var(--text)"}}>PrintOS</div><div style={{fontSize:10,color:"var(--text3)"}}>ניהול בית דפוס</div></div>
      </div>
    </div>

    {/* User */}
    <div style={{padding:"12px 16px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:10}}>
      <Av u={user} sz={32}/>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontWeight:700,fontSize:12,color:"var(--text)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.name}</div>
        <div style={{fontSize:10,color:"var(--text3)"}}>{isA?"מנהל ראשי":user.dept}</div>
      </div>
      <button onClick={()=>{setUser(null);setTasks([]);setClients([]);}} style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:14,padding:2}}>⎋</button>
    </div>

    {/* Nav */}
    <nav style={{padding:"12px 10px",flex:1,overflowY:"auto"}}>

        <span style={{fontSize:15}}>{n.ic}</span>{n.lb}
        {tab===n.id&&<div style={{marginRight:"auto",width:6,height:6,borderRadius:"50%",background:"var(--blue)"}}/>}
      </button>)}

      {isA&&<div style={{marginTop:12,paddingTop:12,borderTop:"1px solid var(--border)"}}>
        <div style={{fontSize:10,fontWeight:700,color:"var(--text3)",letterSpacing:"0.06em",marginBottom:8,paddingRight:4}}>מחלקות</div>

          const color=DEPT_COLORS[dept]||"#2563EB";
          const count=tasks.filter(t=>t.dept===dept&&t.status!=="הושלם").length;
          const isActive=tab==="tasks"&&deptFilter===dept;
          return<button key={dept} onClick={()=>{setTab("tasks");setDeptFilter(dept);setMob(false);}} style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"7px 12px",borderRadius:9,border:"none",cursor:"pointer",background:isActive?`${color}15`:"transparent",fontFamily:"inherit",marginBottom:2,transition:"all 0.15s"}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:color,flexShrink:0}}/>
            <span style={{fontSize:12,fontWeight:isActive?700:400,color:isActive?color:"var(--text2)",flex:1,textAlign:"right"}}>{dept}</span>
            {count>0&&<span style={{background:color,color:"#fff",borderRadius:20,padding:"1px 7px",fontSize:10,fontWeight:700,flexShrink:0}}>{count}</span>}
          </button>;
        })}
      </div>}
    </nav>

    {/* Actions */}
    <div style={{padding:"0 10px 16px",display:"flex",flexDirection:"column",gap:6}}>
      {isA&&<button onClick={()=>{setAddTask(true);setMob(false);}} style={{width:"100%",padding:"9px",borderRadius:10,border:"none",background:"var(--blue)",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer",fontFamily:"inherit",boxShadow:"0 2px 8px rgba(37,99,235,0.25)"}}>+ משימה חדשה</button>}
    </div>
  </div>;

  return<div style={{minHeight:"100vh",background:"var(--bg)",fontFamily:"'Heebo',sans-serif",color:"var(--text)"}}>

    {/* Notification */}
    {notif&&<div style={{position:"fixed",top:20,left:"50%",transform:"translateX(-50%)",background:notif.c,color:"#fff",padding:"10px 20px",borderRadius:12,fontWeight:600,zIndex:9999,boxShadow:"var(--shadow-lg)",whiteSpace:"nowrap",fontSize:13,animation:"fadeUp 0.3s ease"}}>{notif.m}</div>}

    {mob&&<div onClick={()=>setMob(false)} style={{position:"fixed",inset:0,background:"rgba(15,23,42,0.3)",zIndex:199}}/>}

    {/* Desktop sidebar */}
    <div style={{position:"fixed",top:0,bottom:0,right:0,width:"var(--sidebar)",background:"#fff",borderLeft:"1px solid var(--border)",zIndex:200}} className="sd"><SideInner/></div>

    {/* Mobile sidebar */}
    <div style={{position:"fixed",top:0,bottom:0,right:0,width:260,background:"#fff",borderLeft:"1px solid var(--border)",zIndex:210,transform:mob?"translateX(0)":"translateX(100%)",transition:"transform 0.25s ease",display:"none"}} className="sm"><SideInner/></div>

    {/* Mobile topbar */}
    <div className="tm" style={{display:"none",position:"sticky",top:0,zIndex:150,background:"#fff",borderBottom:"1px solid var(--border)",padding:"10px 16px",alignItems:"center",justifyContent:"space-between",boxShadow:"var(--shadow)"}}>
      <div style={{display:"flex",alignItems:"center",gap:8}}>
        <div style={{width:28,height:28,borderRadius:8,background:"linear-gradient(135deg,#2563EB,#7C3AED)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>🖨️</div>
        <span style={{fontWeight:800,fontSize:15,color:"var(--text)"}}>PrintOS</span>
        {tab!=="dashboard"&&<><span style={{color:"var(--text3)"}}>›</span><span style={{fontSize:13,color:"var(--text2)",fontWeight:600}}>{navs.find(n=>n.id===tab)?.lb}</span></>}
      </div>
      <div style={{display:"flex",gap:8}}>
        {tab!=="dashboard"&&<button onClick={()=>setTab("dashboard")} style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:7,color:"var(--text2)",cursor:"pointer",padding:"5px 10px",fontSize:12,fontFamily:"inherit"}}>🏠</button>}
        <button onClick={()=>setMob(true)} style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:7,color:"var(--text)",cursor:"pointer",padding:"5px 10px",fontSize:16}}>☰</button>
      </div>
    </div>

    {/* Mobile bottom nav */}
    <div className="bn" style={{display:"none",position:"fixed",bottom:0,left:0,right:0,zIndex:150,background:"#fff",borderTop:"1px solid var(--border)",boxShadow:"0 -2px 8px rgba(0,0,0,0.06)"}}>
      <div style={{display:"flex",justifyContent:"space-around",padding:"6px 0 8px"}}>
        {navs.map(n=><button key={n.id} onClick={()=>setTab(n.id)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 10px",color:tab===n.id?"var(--blue)":"var(--text3)",fontFamily:"inherit"}}>
          <span style={{fontSize:18}}>{n.ic}</span>
          <span style={{fontSize:10,fontWeight:600}}>{n.lb}</span>
        </button>)}
        {isA&&<button onClick={()=>setAddTask(true)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"4px 10px",color:"var(--blue)",fontFamily:"inherit"}}>
          <span style={{fontSize:18}}>＋</span><span style={{fontSize:10,fontWeight:600}}>הוסף</span>
        </button>}
      </div>
    </div>

    {/* Main content */}
    <div className="ma" style={{marginRight:"var(--sidebar)",padding:"28px 32px 40px"}}>

      {/* Breadcrumb */}
      {tab!=="dashboard"&&<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:20}}>
        <button onClick={()=>setTab("dashboard")} style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:8,color:"var(--text2)",cursor:"pointer",padding:"5px 12px",fontSize:12,fontWeight:600,fontFamily:"inherit",display:"flex",alignItems:"center",gap:5}}>🏠 דשבורד</button>
        <span style={{color:"var(--text3)"}}>›</span>
        <span style={{fontSize:13,fontWeight:600,color:"var(--text)"}}>{navs.find(n=>n.id===tab)?.lb}</span>
      </div>}

      {/* DASHBOARD */}
      {tab==="dashboard"&&<div>
        <div style={{marginBottom:24}}>
          <h1 style={{fontSize:24,fontWeight:900,color:"var(--text)",margin:0}}>שלום, {user.name.split(" ")[0]} 👋</h1>
          <p style={{color:"var(--text3)",margin:"5px 0 0",fontSize:13}}>{isA?"סקירה כללית של בית הדפוס":`הבורד שלך — מחלקת ${user.dept}`}</p>
        </div>
        {loading&&<div style={{display:"flex",alignItems:"center",gap:8,color:"var(--text3)",fontSize:13,marginBottom:16}}><Spinner sz={16}/> טוען נתונים...</div>}

        {/* KPIs */}
        <div className="kg4" style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:14,marginBottom:20}}>
          {[
            {lb:"בביצוע",v:byS("בביצוע"),c:"var(--blue)",bg:"var(--blue-light)",ic:"⚡"},
            {lb:"ממתינות",v:byS("ממתין"),c:"var(--amber)",bg:"var(--amber-light)",ic:"⏳"},
            {lb:"הושלמו",v:byS("הושלם"),c:"var(--green)",bg:"var(--green-light)",ic:"✓"},
            {lb:"תקועות",v:byS("תקוע"),c:"var(--red)",bg:"var(--red-light)",ic:"⚠"},
          ].map((x,i)=><Card key={i} style={{padding:"18px 16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontSize:28,fontWeight:900,color:x.c,lineHeight:1}}>{x.v}</div>
                <div style={{fontSize:12,color:"var(--text3)",marginTop:5,fontWeight:500}}>{x.lb}</div>
              </div>
              <div style={{width:36,height:36,borderRadius:10,background:x.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>{x.ic}</div>
            </div>
          </Card>)}
        </div>

        <div className="mg" style={{display:"grid",gridTemplateColumns:isA?"1fr 1fr":"1fr",gap:16,marginBottom:16}}>
          {isA&&<Card>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontWeight:700,fontSize:14,color:"var(--text)"}}>💳 גבייה</div>
              <button onClick={()=>setTab("debt")} style={{background:"none",border:"none",color:"var(--blue)",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit"}}>פירוט ←</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              <div style={{background:"var(--green-light)",borderRadius:10,padding:12}}>
                <div style={{color:"var(--text3)",fontSize:10,fontWeight:600,marginBottom:3}}>סה״כ</div>
                <div style={{fontSize:18,fontWeight:800,color:"var(--green)"}}>₪{totD.toLocaleString()}</div>
              </div>
              <div style={{background:"var(--red-light)",borderRadius:10,padding:12}}>
                <div style={{color:"var(--text3)",fontSize:10,fontWeight:600,marginBottom:3}}>באיחור</div>
                <div style={{fontSize:18,fontWeight:800,color:"var(--red)"}}>₪{ovD.toLocaleString()}</div>
              </div>
            </div>
            {debt.filter(d=>d.status==="באיחור").slice(0,3).map(d=><div key={d.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid var(--border)"}}>
              <div><div style={{fontWeight:600,fontSize:12,color:"var(--text)"}}>{d.client_name}</div><div style={{color:"var(--red)",fontSize:11}}>{d.days_overdue} ימי איחור</div></div>
              <div style={{fontWeight:700,color:"var(--red)",fontSize:13}}>₪{Number(d.amount).toLocaleString()}</div>
            </div>)}
            {debt.filter(d=>d.status==="באיחור").length===0&&<div style={{textAlign:"center",color:"var(--text3)",fontSize:12,padding:"10px 0"}}>אין חובות באיחור 🎉</div>}
          </Card>}

          <Card>
            <div style={{fontWeight:700,fontSize:14,color:"var(--text)",marginBottom:16}}>🏭 עומס מחלקות</div>
            {(isA?DEPTS:[user.dept]).map((dept,i)=>{
              const dt=tasks.filter(t=>t.dept===dept);
              const done=dt.filter(t=>t.status==="הושלם").length;
              const pct=dt.length?Math.round((done/dt.length)*100):0;
              const color=DEPT_COLORS[dept]||"#2563EB";
              return<div key={dept} style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
                  <span style={{fontSize:12,fontWeight:600,color:"var(--text)"}}>{dept}</span>
                  <span style={{fontSize:11,color:"var(--text3)"}}>{done}/{dt.length}</span>
                </div>
                <div style={{height:6,background:"var(--bg3)",borderRadius:10}}>
                  <div style={{height:"100%",borderRadius:10,width:`${pct}%`,background:color,transition:"width 0.5s"}}/>
                </div>
              </div>;
            })}
          </Card>
        </div>

        <Card>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{fontWeight:700,fontSize:14,color:"var(--text)"}}>📋 משימות אחרונות</div>
            <button onClick={()=>setTab("tasks")} style={{background:"none",border:"none",color:"var(--blue)",cursor:"pointer",fontSize:12,fontWeight:600,fontFamily:"inherit"}}>הכל ←</button>
          </div>
          {tasks.slice(0,5).map(t=><div key={t.id} onClick={()=>setDet(t)} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid var(--border)",cursor:"pointer"}}>
            <div style={{width:4,height:36,borderRadius:4,background:DEPT_COLORS[t.dept]||"var(--blue)",flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,fontSize:13,color:"var(--text)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.title}</div>
              <div style={{color:"var(--text3)",fontSize:11,marginTop:2}}>{t.client_name} • {t.dept}</div>
            </div>
            <Badge status={t.status}/>
          </div>)}
          {tasks.length===0&&!loading&&<div style={{textAlign:"center",padding:"20px 0",color:"var(--text3)",fontSize:13}}>אין משימות עדיין 🚀</div>}
        </Card>
      </div>}

      {/* TASKS */}
      {tab==="tasks"&&<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,gap:12,flexWrap:"wrap"}}>
          <div><h1 style={{fontSize:22,fontWeight:800,color:"var(--text)",margin:0}}>{isA?"לוח משימות":user.dept}</h1><p style={{color:"var(--text3)",margin:"3px 0 0",fontSize:13}}>{visTasks.length} משימות</p></div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>load()} style={{padding:"8px 12px",borderRadius:9,border:"1px solid var(--border)",background:"#fff",color:"var(--text2)",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>↻</button>
            {isA&&<button onClick={()=>setAddTask(true)} style={{padding:"9px 18px",borderRadius:9,border:"none",background:"var(--blue)",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit",boxShadow:"0 2px 8px rgba(37,99,235,0.25)"}}>+ חדשה</button>}
            {!isA&&<button onClick={()=>setAddTask(true)} style={{padding:"9px 18px",borderRadius:9,border:"none",background:"var(--blue)",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit",boxShadow:"0 2px 8px rgba(37,99,235,0.25)"}}>+ חדשה</button>}
          </div>
        </div>

        <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
          {["הכל",...DEPTS].map(d=><button key={d} onClick={()=>setDeptFilter(d)} style={{padding:"5px 12px",borderRadius:20,border:`1px solid ${deptFilter===d?DEPT_COLORS[d]||"var(--blue)":"var(--border)"}`,background:deptFilter===d?`${DEPT_COLORS[d]||"#2563EB"}10`:"#fff",color:deptFilter===d?DEPT_COLORS[d]||"var(--blue)":"var(--text2)",fontWeight:600,fontSize:11,cursor:"pointer",fontFamily:"inherit",transition:"all 0.15s"}}>{d}</button>)}
        </div>

        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {visTasks.map(t=><div key={t.id} style={{background:"#fff",border:"1px solid var(--border)",borderRadius:13,padding:"14px 16px",cursor:"pointer",boxShadow:"var(--shadow)",borderRight:`4px solid ${DEPT_COLORS[t.dept]||"var(--blue)"}`}} onClick={()=>setDet(t)}>
            <div style={{display:"flex",alignItems:"flex-start",gap:10,marginBottom:10}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:14,color:"var(--text)",marginBottom:3}}>{t.title}</div>
                <div style={{color:"var(--text3)",fontSize:12}}>{t.client_name}{t.client_name&&" · "}{t.dept}{t.assignee&&" · "+t.assignee}</div>
              </div>
              <PriBadge p={t.priority}/>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}} onClick={e=>e.stopPropagation()}>
              <Badge status={t.status}/>
              <select value={t.status} onChange={e=>updStatus(t.id,e.target.value)} style={{background:"var(--bg2)",border:"1px solid var(--border)",borderRadius:7,padding:"4px 9px",color:"var(--text)",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",direction:"rtl"}}>
                {["ממתין","בביצוע","הושלם","תקוע"].map(s=><option key={s} value={s}>{s}</option>)}
              </select>
              {t.due_date&&<span style={{color:"var(--text3)",fontSize:11,marginRight:"auto"}}>📅 {t.due_date}</span>}
              {<button onClick={()=>deleteTask(t.id)} style={{marginRight:"auto",padding:"4px 8px",borderRadius:7,border:"1px solid var(--red-light)",background:"var(--red-light)",color:"var(--red)",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>🗑️</button>}
              {<button onClick={e=>{e.stopPropagation();setEditTask({...t});}} style={{padding:"4px 8px",borderRadius:7,border:"1px solid var(--border)",background:"var(--bg2)",color:"var(--text2)",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>✏️ ערוך</button>}
              {
              <button onClick={()=>{
                const recipients={
                  "כפיר":"kfir.dfus@gmail.com",
                  "נטלי":"natalie.zem@gmail.com",
                  "דניאל":"daniel.natalie.print@gmail.com",
                  "אדם":"adam.dfusnatalie@gmail.com",
                  "איריס":"iris.z726@gmail.com",
                  "ברק":"BARAKDFUS268@gmail.com",
                };
                const name=window.prompt("שלח תזכורת למי?\n"+Object.keys(recipients).join(" / "));
                if(!name)return;
                const email=recipients[name];
                if(!email){notify("לא נמצא","#DC2626");return;}
                const msg=`תזכורת משימה:\n\nכותרת: ${t.title}\nמחלקה: ${t.dept}\nסטטוס: ${t.status}\nלקוח: ${t.client_name||"—"}\nאחראי: ${t.assignee||"—"}\nתאריך יעד: ${t.due_date||"—"}\n${t.notes?"הערות: "+t.notes:""}`;
                emailjs.send("service_el3vmud","template_zfjuge9",{subject:`⏰ תזכורת: ${t.title}`,message:msg,to_email:email}).then(()=>notify(`📧 נשלח ל-${name}!`)).catch(()=>notify("שגיאה","#DC2626"));
              }} style={{padding:"4px 8px",borderRadius:7,border:"1px solid var(--blue-mid)",background:"var(--blue-light)",color:"var(--blue)",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>🔔 תזכורת</button>}
            </div>
          </div>)}
          {visTasks.length===0&&!loading&&<div style={{textAlign:"center",padding:"60px 20px",color:"var(--text3)"}}>
            <div style={{fontSize:36,marginBottom:10}}>📋</div>
            <div style={{fontWeight:600,fontSize:14}}>אין משימות</div>
          </div>}
        </div>
      </div>}

      {/* CLIENTS */}
      {tab==="clients"&&isA&&<div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:12}}>
          <div><h1 style={{fontSize:22,fontWeight:800,color:"var(--text)",margin:0}}>אנשי קשר</h1><p style={{color:"var(--text3)",margin:"3px 0 0",fontSize:13}}>{clients.length} לקוחות</p></div>
          <button onClick={()=>setAddClient(true)} style={{padding:"9px 18px",borderRadius:9,border:"none",background:"var(--green)",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>+ לקוח חדש</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {clients.map(c=><Card key={c.id} style={{padding:"14px 16px"}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
              <div style={{width:40,height:40,borderRadius:"50%",background:"var(--blue)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,color:"#fff",flexShrink:0}}>{c.name[0]}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:14,color:"var(--text)",marginBottom:6}}>{c.name}</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:12}}>
                  {c.phone&&<span style={{color:"var(--text2)",fontSize:12}}>📞 {c.phone}</span>}
                  {c.email&&<span style={{color:"var(--text2)",fontSize:12}}>✉️ {c.email}</span>}
                  {c.address&&<span style={{color:"var(--text2)",fontSize:12}}>📍 {c.address}</span>}
                  {c.payment_terms&&<span style={{background:"var(--blue-light)",color:"var(--blue)",fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:20}}>{c.payment_terms}</span>}
                </div>
              </div>
            </div>
          </Card>)}
          {clients.length===0&&!loading&&<div style={{textAlign:"center",padding:"60px 20px",color:"var(--text3)"}}>
            <div style={{fontSize:36,marginBottom:10}}>👥</div>
            <div style={{fontWeight:600,fontSize:14}}>אין לקוחות עדיין</div>
          </div>}
        </div>
      </div>}

      {/* CALENDAR */}
      {tab==="calendar"&&<CalendarTab tasks={tasks} user={user} isA={isA} onTaskClick={setDet}/>}

      {/* DEBT */}
      {tab==="debt"&&isA&&<DebtTab debt={debt} notify={notify}/>}

      {/* DELIVERY REPORT */}
      {tab==="delivery"&&isA&&<DeliveryTab tasks={tasks}/>}
    </div>

    {/* MODALS */}
    <Modal open={addTask} onClose={()=>setAddTask(false)} title="+ משימה חדשה">
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div><label style={LS}>כותרת *</label><input style={IS} value={nt.title} onChange={e=>setNt(p=>({...p,title:e.target.value}))} placeholder="תיאור המשימה..."/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><label style={LS}>מחלקה</label><select style={IS} value={nt.dept} onChange={e=>setNt(p=>({...p,dept:e.target.value,assignee:""}))}>
            {DEPTS.map(d=><option key={d} value={d}>{d}</option>)}</select></div>
          <div><label style={LS}>עדיפות</label><select style={IS} value={nt.priority} onChange={e=>setNt(p=>({...p,priority:e.target.value}))}>
            {["גבוהה","בינונית","נמוכה"].map(p=><option key={p} value={p}>{p}</option>)}</select></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><label style={LS}>לקוח</label><select style={IS} value={nt.client_name} onChange={e=>setNt(p=>({...p,client_name:e.target.value}))}>
            <option value="">בחר לקוח...</option>{clients.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}</select></div>
          <div><label style={LS}>אחראי</label><select style={IS} value={nt.assignee} onChange={e=>setNt(p=>({...p,assignee:e.target.value}))}>
            <option value="">בחר עובד...</option>{allUsers.filter(u=>u.dept===nt.dept).map(u=><option key={u.id} value={u.name}>{u.name}</option>)}</select></div>
        </div>
        {nt.dept==="משלוחים"&&<div style={{background:"#EFF6FF",border:"1px solid #BFDBFE",borderRadius:10,padding:14}}>
          <div style={{color:"var(--blue)",fontSize:11,fontWeight:700,marginBottom:10}}>🚚 פרטי משלוח</div>
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            <div><label style={LS}>נהג</label><select style={IS} value={nt.driver||""} onChange={e=>setNt(p=>({...p,driver:e.target.value}))}>
              <option value="">בחר נהג...</option>
              {["חיים","ניסן/ברק","טייגר","עומרי"].map(d=><option key={d} value={d}>{d}</option>)}
            </select></div>
            <div><label style={LS}>איש קשר</label>
              <select style={IS} value={nt.contact||""} onChange={e=>{
                const selected=clients.find(c=>c.name===e.target.value);
                setNt(p=>({...p,contact:e.target.value,phone:selected?.phone||p.phone}));
              }}>
                <option value="">בחר מהרשימה...</option>
                {clients.map(c=><option key={c.id} value={c.name}>{c.name}{c.phone?` — ${c.phone}`:''}</option>)}
              </select>
              <input style={{...IS,marginTop:6}} value={nt.contact||""} onChange={e=>setNt(p=>({...p,contact:e.target.value}))} placeholder="או הקלד ידנית..."/>
            </div>
            <div><label style={LS}>כתובת יעד</label><input style={IS} value={nt.address} onChange={e=>setNt(p=>({...p,address:e.target.value}))} placeholder="רחוב, עיר"/></div>
            <div><label style={LS}>טלפון</label><input style={IS} value={nt.phone} onChange={e=>setNt(p=>({...p,phone:e.target.value}))} placeholder="050-0000000" type="tel"/></div>
          </div>
        </div>}
        <div><label style={LS}>תאריך יעד</label><input type="date" style={IS} value={nt.due_date} onChange={e=>setNt(p=>({...p,due_date:e.target.value}))}/></div>
        <div><label style={LS}>הערות</label><input style={IS} value={nt.notes} onChange={e=>setNt(p=>({...p,notes:e.target.value}))} placeholder="הערות..."/></div>
        <div style={{display:"flex",gap:10,marginTop:4}}>
          <button onClick={doAddTask} style={{flex:1,padding:"11px",borderRadius:10,border:"none",background:"var(--blue)",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>הוסף משימה</button>
          <button onClick={()=>setAddTask(false)} style={{padding:"11px 16px",borderRadius:10,border:"1px solid var(--border)",background:"#fff",color:"var(--text2)",fontWeight:600,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>ביטול</button>
        </div>
      </div>
    </Modal>

    <Modal open={addClient} onClose={()=>setAddClient(false)} title="+ לקוח חדש">
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div><label style={LS}>שם *</label><input style={IS} value={nc.name} onChange={e=>setNc(p=>({...p,name:e.target.value}))} placeholder="שם חברה / לקוח"/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><label style={LS}>טלפון</label><input style={IS} value={nc.phone} onChange={e=>setNc(p=>({...p,phone:e.target.value}))} placeholder="050-0000000"/></div>
          <div><label style={LS}>מייל</label><input style={IS} value={nc.email} onChange={e=>setNc(p=>({...p,email:e.target.value}))} placeholder="name@co.il"/></div>
        </div>
        <div><label style={LS}>כתובת</label><input style={IS} value={nc.address} onChange={e=>setNc(p=>({...p,address:e.target.value}))} placeholder="רחוב, עיר"/></div>
        <div><label style={LS}>תנאי תשלום</label><select style={IS} value={nc.payment_terms} onChange={e=>setNc(p=>({...p,payment_terms:e.target.value}))}>
          {["שוטף","שוטף + 30","שוטף + 60","שוטף + 90","מזומן"].map(t=><option key={t} value={t}>{t}</option>)}</select></div>
        <div style={{display:"flex",gap:10,marginTop:4}}>
          <button onClick={doAddClient} style={{flex:1,padding:"11px",borderRadius:10,border:"none",background:"var(--green)",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>הוסף לקוח</button>
          <button onClick={()=>setAddClient(false)} style={{padding:"11px 16px",borderRadius:10,border:"1px solid var(--border)",background:"#fff",color:"var(--text2)",fontWeight:600,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>ביטול</button>
        </div>
      </div>
    </Modal>

    <Modal open={!!det} onClose={()=>setDet(null)} title={det?.title}>
      {det&&<div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>
          {[["לקוח",det.client_name],["מחלקה",det.dept],["אחראי",det.assignee],["עדיפות",det.priority],["תאריך",det.due_date],["הערות",det.notes]].filter(([,v])=>v).map(([l,v])=><div key={l} style={{background:"var(--bg2)",borderRadius:10,padding:"10px 12px"}}>
            <div style={{color:"var(--text3)",fontSize:10,fontWeight:700,marginBottom:3}}>{l}</div>
            <div style={{fontWeight:600,fontSize:13,color:"var(--text)"}}>{v}</div>
          </div>)}
        </div>
        <label style={LS}>עדכן סטטוס</label>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {["ממתין","בביצוע","הושלם","תקוע"].map(s=>{
            const sc=SC[s];
            return<button key={s} onClick={()=>updStatus(det.id,s)} style={{padding:"10px",borderRadius:9,border:`1px solid ${det.status===s?sc.c:"var(--border)"}`,background:det.status===s?sc.bg:"#fff",color:det.status===s?sc.c:"var(--text2)",fontWeight:600,fontSize:13,cursor:"pointer",fontFamily:"inherit",transition:"all 0.15s"}}>{s}</button>;
          })}
        </div>
      </div>}
    </Modal>

    {/* AI Chat */}
    {showChat&&<AiChat user={user} tasks={tasks} clients={clients} onRefresh={load} onClose={()=>setShowChat(false)}/>}
    {!showChat&&<button onClick={()=>setShowChat(true)} style={{position:"fixed",bottom:28,left:28,width:52,height:52,borderRadius:"50%",background:"linear-gradient(135deg,#2563EB,#7C3AED)",border:"none",color:"#fff",fontSize:22,cursor:"pointer",boxShadow:"0 4px 20px rgba(37,99,235,0.4)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center"}}>🤖</button>}

    {/* Edit Task Modal */}
    <Modal open={!!editTask} onClose={()=>setEditTask(null)} title="✏️ עריכת משימה">
      {editTask&&<div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div><label style={LS}>כותרת</label><input style={IS} value={editTask.title} onChange={e=>setEditTask(p=>({...p,title:e.target.value}))}/></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><label style={LS}>מחלקה</label><select style={IS} value={editTask.dept} onChange={e=>setEditTask(p=>({...p,dept:e.target.value}))}>
            {DEPTS.map(d=><option key={d} value={d}>{d}</option>)}</select></div>
          <div><label style={LS}>עדיפות</label><select style={IS} value={editTask.priority} onChange={e=>setEditTask(p=>({...p,priority:e.target.value}))}>
            {["גבוהה","בינונית","נמוכה"].map(p=><option key={p} value={p}>{p}</option>)}</select></div>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <div><label style={LS}>לקוח</label><select style={IS} value={editTask.client_name||""} onChange={e=>setEditTask(p=>({...p,client_name:e.target.value}))}>
            <option value="">בחר לקוח...</option>{clients.map(c=><option key={c.id} value={c.name}>{c.name}</option>)}</select></div>
          <div><label style={LS}>אחראי</label><select style={IS} value={editTask.assignee||""} onChange={e=>setEditTask(p=>({...p,assignee:e.target.value}))}>
            <option value="">בחר עובד...</option>{allUsers.filter(u=>u.dept===editTask.dept).map(u=><option key={u.id} value={u.name}>{u.name}</option>)}</select></div>
        </div>
        <div><label style={LS}>סטטוס</label><select style={IS} value={editTask.status} onChange={e=>setEditTask(p=>({...p,status:e.target.value}))}>
          {["ממתין","בביצוע","הושלם","תקוע"].map(s=><option key={s} value={s}>{s}</option>)}</select></div>
        <div><label style={LS}>תאריך יעד</label><input type="date" style={IS} value={editTask.due_date||""} onChange={e=>setEditTask(p=>({...p,due_date:e.target.value}))}/></div>
        <div><label style={LS}>הערות</label><input style={IS} value={editTask.notes||""} onChange={e=>setEditTask(p=>({...p,notes:e.target.value}))} placeholder="הערות..."/></div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={doEditTask} style={{flex:1,padding:"11px",borderRadius:10,border:"none",background:"var(--blue)",color:"#fff",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>שמור שינויים</button>
          <button onClick={()=>setEditTask(null)} style={{padding:"11px 16px",borderRadius:10,border:"1px solid var(--border)",background:"#fff",color:"var(--text2)",fontWeight:600,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>ביטול</button>
        </div>
      </div>}
    </Modal>
  </div>;


}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
