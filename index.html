function App(){

const [tasks,setTasks]=useState([]);
const [clients,setClients]=useState([]);
const [debt,setDebt]=useState([]);
const [tab,setTab]=useState(“dashboard”);
const [mob,setMob]=useState(false);
const [addTask,setAddTask]=useState(false);
const [addClient,setAddClient]=useState(false);
const [det,setDet]=useState(null);
const [df,setDf]=useState(“הכל”);
const [notif,setNotif]=useState(null);
const [loading,setLoading]=useState(false);
const [nt,setNt]=useState({title:””,dept:DEPTS[0],priority:“בינונית”,client_name:””,assignee:””,due_date:””,notes:””,status:“ממתין”,address:””,phone:””});
const [nc,setNc]=useState({name:””,phone:””,email:””,address:””,payment_terms:“שוטף + 30”});
const [allUsers,setAllUsers]=useState([]);

useEffect(()=>{
sb(“users?role=eq.worker&order=name.asc”).then(setAllUsers).catch(()=>{});
},[]);

const notify=(m,c=”#10B981”)=>{setNotif({m,c});setTimeout(()=>setNotif(null),3000)};

const load=async(u)=>{
const cu=u||user;if(!cu)return;
setLoading(true);
try{
const a=cu.role===“admin”;
const tp=a?“tasks?order=created_at.desc”:`tasks?dept=eq.${encodeURIComponent(cu.dept)}&order=created_at.desc`;
const [t,c,d]=await Promise.all([sb(tp),sb(“clients?order=name.asc”),a?sb(“debt?order=due_date.asc”):Promise.resolve([])]);
setTasks(t);setClients(c);setDebt(d);
}catch(e){notify(“שגיאה: “+e.message,”#EF4444”);}
setLoading(false);
};

const isA=user?.role===“admin”;
const filt=(isA&&df!==“הכל”)?tasks.filter(t=>t.dept===df):tasks;
const byS=s=>tasks.filter(t=>t.status===s).length;
const totD=debt.reduce((s,d)=>s+Number(d.amount),0);
const ovD=debt.filter(d=>d.status===“באיחור”).reduce((s,d)=>s+Number(d.amount),0);

const doAddTask=async()=>{
if(!nt.title.trim())return;
try{
let notes=nt.notes||””;
if(nt.dept===“משלוחים”){
const parts=[];
if(nt.address)parts.push(`📍 ${nt.address}`);
if(nt.phone)parts.push(`📞 ${nt.phone}`);
if(parts.length)notes=(parts.join(” | “)+(notes?” | “+notes:””));
}
await sb(“tasks”,{method:“POST”,body:JSON.stringify({title:nt.title,dept:nt.dept,priority:nt.priority,client_name:nt.client_name,assignee:nt.assignee,due_date:nt.due_date||null,notes,status:nt.status,created_by:user.name})});
setNt({title:””,dept:DEPTS[0],priority:“בינונית”,client_name:””,assignee:””,due_date:””,notes:””,status:“ממתין”,address:””,phone:””});
setAddTask(false);await load();notify(“✅ משימה נוספה”);
}catch(e){notify(“שגיאה”,”#EF4444”);}
};

const doAddClient=async()=>{
if(!nc.name.trim())return;
try{await sb(“clients”,{method:“POST”,body:JSON.stringify(nc)});
setNc({name:””,phone:””,email:””,address:””,payment_terms:“שוטף + 30”});
setAddClient(false);await load();notify(“✅ לקוח נוסף”);}catch(e){notify(“שגיאה”,”#EF4444”);}
};

const updStatus=async(id,s)=>{
try{await sb(`tasks?id=eq.${id}`,{method:“PATCH”,body:JSON.stringify({status:s})});
setTasks(p=>p.map(t=>t.id===id?{…t,status:s}:t));
if(det?.id===id)setDet(p=>({…p,status:s}));
notify(`עודכן: ${s}`);}catch(e){notify(“שגיאה”,”#EF4444”);}
};
